input { pipeline { address => "simulate-end" } }

filter {
  # Mark this as the final step
  ruby {
    id => "sim_end_ruby"
    code => "event.set('[simulation][step]', event.get('[simulation][step]').to_i + 1); event.set('[simulation][id]', 'final')"
  }
}

output {
  # Send final message to StreamSimulate
  # URL is set via LOGSTASH_URL env var
  # HTTP (standalone): http://host.docker.internal:8080
  # HTTPS (docker-compose): https://host.docker.internal
  http {
    id => "sim_start_http"
    http_method => "post"
    url => "${LOGSTASH_URL:http://host.docker.internal:8080}/API/StreamSimulate/"
    format => "json"
    content_type => "application/json"
    ssl_verification_mode => "none"
  }
}
