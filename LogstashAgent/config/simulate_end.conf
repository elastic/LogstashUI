input { pipeline { address => "simulate-end" } }

filter {
  # Mark this as the final step
  ruby {
    id => "sim_end_ruby"
    code => "event.set('[simulation][step]', event.get('[simulation][step]').to_i + 1); event.set('[simulation][id]', 'final')"
  }
}

output {
  # Send final message to StreamSimulate
  # URL is set via LOGSTASH_URL env var
  # HTTP (standalone): http://host.docker.internal:8080
  # HTTPS (docker-compose): https://host.docker.internal
  http {
    id => "sim_end_http"        # Fixed: was duplicate 'sim_start_http'
    http_method => "post"
    url => "${LOGSTASH_URL:http://host.docker.internal:8080}/ConnectionManager/StreamSimulate/"
    format => "json"
    content_type => "application/json"
    ssl_verification_mode => "none"
    
    # Memory leak prevention settings
    pool_max => 10              # Limit connection pool size (default: 50)
    pool_max_per_route => 5     # Max connections per route (default: 25)
    keepalive => true           # Reuse connections
    automatic_retries => 1      # Limit retries (default: 3)
    retry_non_idempotent => false  # Don't retry POST on failure
    connect_timeout => 10       # Connection timeout in seconds
    request_timeout => 30       # Request timeout in seconds
    socket_timeout => 30        # Socket read timeout
  }
}
