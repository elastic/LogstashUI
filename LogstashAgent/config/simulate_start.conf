input {
  http {
    port => 8082
    codec => json
  }
}

filter {
  mutate {
    id => "a000-input-prune-added-fields"
    rename => {"url" => "[@metadata][pruned][url]"}
    rename => {"http" => "[@metadata][pruned][http]"}
    rename => {"user_agent" => "[@metadata][pruned][user_agent]"}
    remove_field => ["[host][ip]"]
    add_field => {"[host][name]" => "LOGSTASH-HOST"}
  }
}

output {
  if [slot] == 1 {
    pipeline { send_to => "slot1-filter1" }
  } else if [slot] == 2 {
    pipeline { send_to => "slot2-filter1" }
  } else if [slot] == 3 {
    pipeline { send_to => "slot3-filter1" }
  } else if [slot] == 4 {
    pipeline { send_to => "slot4-filter1" }
  } else if [slot] == 5 {
    pipeline { send_to => "slot5-filter1" }
  } else if [slot] == 6 {
    pipeline { send_to => "slot6-filter1" }
  } else if [slot] == 7 {
    pipeline { send_to => "slot7-filter1" }
  } else if [slot] == 8 {
    pipeline { send_to => "slot8-filter1" }
  } else if [slot] == 9 {
    pipeline { send_to => "slot9-filter1" }
  } else if [slot] == 10 {
    pipeline { send_to => "slot10-filter1" }
  } else {
    # Fallback - drop events without a valid slot
    drop { }
  }
}
