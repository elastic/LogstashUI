input {
  http {
    port => 9449
    codec => json {
      ecs_compatibility => disabled
    }
  }
}

filter {
  mutate {
    id => "sim_start_mutate"
    rename => {"url" => "[@metadata][pruned][url]"}
    rename => {"http" => "[@metadata][pruned][http]"}
    rename => {"user_agent" => "[@metadata][pruned][user_agent]"}
    remove_field => ["[host][ip]"]
    add_field => {"[host][name]" => "LOGSTASH-HOST"}
  }
  
  # Add step 0 to indicate this is the original input
    mutate {
      id => "sim_start_mutate_simulation"
      add_field => {
        "[simulation][step]" => "0"
        "[simulation][id]" => "original"
      }
    }
}

output {
  # Send original message to StreamSimulate
  http {
    id => "sim_start_http"
    http_method => "post"
    url => "${LOGSTASH_URL:http://host.docker.internal:8080}/ConnectionManager/StreamSimulate/"
    format => "json"
    content_type => "application/json"
    ssl_verification_mode => "none"
    
    # Memory leak prevention settings
    pool_max => 10              # Limit connection pool size (default: 50)
    pool_max_per_route => 5     # Max connections per route (default: 25)
    keepalive => true           # Reuse connections
    automatic_retries => 1      # Limit retries (default: 3)
    retry_non_idempotent => false  # Don't retry POST on failure
    connect_timeout => 10       # Connection timeout in seconds
    request_timeout => 30       # Request timeout in seconds
    socket_timeout => 30        # Socket read timeout
  }

  # Route to appropriate slot
  if [slot] == 1 {
    pipeline { send_to => "slot1-filter1" }
  } else if [slot] == 2 {
    pipeline { send_to => "slot2-filter1" }
  } else if [slot] == 3 {
    pipeline { send_to => "slot3-filter1" }
  } else if [slot] == 4 {
    pipeline { send_to => "slot4-filter1" }
  } else if [slot] == 5 {
    pipeline { send_to => "slot5-filter1" }
  } else if [slot] == 6 {
    pipeline { send_to => "slot6-filter1" }
  } else {
    stdout { }
  }
}
