# ============================================================================
# LogstashAgent Fallback Configuration
# ============================================================================
# 
# IMPORTANT: This file is a FALLBACK only. Do NOT edit this file directly.
# 
# Configuration priority:
#   1. Mounted logstashui.yml (docker-compose) - PREFERRED
#   2. This file (logstashagent.yml) - FALLBACK ONLY
#
# To configure the agent:
#   - Edit the main logstashui.yml file in the project root
#   - The agent will automatically read from the mounted config
#
# This file provides embedded mode defaults for when logstashui.yml is not available.
# ============================================================================

mode: simulation
simulation_mode: embedded

# Embedded mode defaults (container paths)
logstash_binary: /usr/share/logstash/bin/logstash
logstash_settings: /etc/logstash
logstash_log_path: /var/log/logstash
