# JSON appender for machine-readable logs
# Total storage: 20MB per file * 5 files = 100MB maximum
appender.json_rolling.type = RollingFile
appender.json_rolling.name = json_rolling
appender.json_rolling.fileName = /var/log/logstash/logstash-json.log
appender.json_rolling.filePattern = /var/log/logstash/logstash-json-%i.log
appender.json_rolling.layout.type = JSONLayout
appender.json_rolling.layout.compact = true
appender.json_rolling.layout.eventEol = true
appender.json_rolling.layout.properties = true
appender.json_rolling.policies.type = Policies
appender.json_rolling.policies.size.type = SizeBasedTriggeringPolicy
appender.json_rolling.policies.size.size = 20MB
appender.json_rolling.strategy.type = DefaultRolloverStrategy
appender.json_rolling.strategy.max = 5
appender.json_rolling.strategy.action.type = Delete
appender.json_rolling.strategy.action.basepath = /var/log/logstash
appender.json_rolling.strategy.action.maxDepth = 1
appender.json_rolling.strategy.action.condition.type = IfFileName
appender.json_rolling.strategy.action.condition.glob = logstash-json-*.log
appender.json_rolling.strategy.action.condition.nested.type = IfAccumulatedFileCount
appender.json_rolling.strategy.action.condition.nested.exceeds = 5

# Console appender for immediate visibility
appender.console.type = Console
appender.console.name = plain_console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = [%d{ISO8601}][%-5p][%-25c{1.}] %m%n

# Root logger configuration
rootLogger.level = info
rootLogger.appenderRef.console.ref = plain_console
rootLogger.appenderRef.json.ref = json_rolling

# Pipeline-related events
logger.pipeline.name = logstash.pipeline
logger.pipeline.level = info

# Filter execution warnings and errors
logger.filters.name = logstash.filters
logger.filters.level = info

# Output plugin issues
logger.outputs.name = logstash.outputs
logger.outputs.level = info

# Ruby filter errors (INFO only, no DEBUG)
logger.ruby.name = logstash.filters.ruby
logger.ruby.level = info
