version: '3.8'

name: LogstashAgent

services:
  logstash-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: logstash-agent-standalone
    ports:
      - "9600:9600"  # Logstash API
      - "9449:9449"  # Logstash HTTP input (simulation)
      - "9500:9500"  # FastAPI sidecar API
    volumes:
      # Persist agent state and logs
      - agent-data:/app/src/logstashagent/data
      # Optional: Mount custom config (uncomment if needed)
      # - ./logstashui.yml:/app/logstashui.yml:ro
    environment:
      # URL where LogstashUI is running (for enrollment/controller mode)
      - LOGSTASH_URL=${LOGSTASH_URL:-http://host.docker.internal:8080}
    extra_hosts:
      # Allow container to reach host machine
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9500/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  agent-data:
    driver: local
