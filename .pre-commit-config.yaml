repos:
  - repo: local
    hooks:
      - id: add-license-headers
        name: Add license headers
        entry: uv run python scripts/add_license_headers.py
        language: system
        pass_filenames: false
      - id: check-licenses
        name: Check dependency licenses
        entry: uv run python scripts/generate_notice.py
        language: system
        pass_filenames: false