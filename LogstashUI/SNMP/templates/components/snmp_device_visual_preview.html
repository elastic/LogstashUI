<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <style>
        @keyframes fan-spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        .fan-spin {
            animation: fan-spin 2s linear infinite;
        }
    </style>
</head>
<body>
  <!-- Device Visual Preview Component -->
  <!-- This component is dynamically populated when a device row is expanded -->
  <template id="device-preview-template">
    <div class="bg-gray-800 rounded-lg p-6">
      <!-- Consolidated Device Configuration Row -->
      <div class="bg-gray-700/50 rounded-lg p-4 mb-6">
        <h3 class="text-sm font-semibold text-gray-300 uppercase mb-3 flex items-center">
          <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          Device Configuration
        </h3>
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 text-sm mb-4">
          <div>
            <span class="text-gray-400 block mb-1">Port</span>
            <span class="text-white font-medium device-port"></span>
          </div>
          <div>
            <span class="text-gray-400 block mb-1">Timeout</span>
            <span class="text-white font-medium device-timeout"></span>
          </div>
          <div>
            <span class="text-gray-400 block mb-1">Retries</span>
            <span class="text-white font-medium device-retries"></span>
          </div>
          <div>
            <span class="text-gray-400 block mb-1">Credential</span>
            <span class="text-white font-medium credential-name"></span>
          </div>
          <div>
            <span class="text-gray-400 block mb-1">Version</span>
            <span class="text-white font-medium credential-version"></span>
          </div>
        </div>
        <div class="border-t border-gray-600 pt-3">
          <span class="text-gray-400 text-xs uppercase block mb-2">SNMP Profiles</span>
          <div class="device-profiles-list flex flex-wrap gap-2">
            <!-- Profiles will be dynamically inserted here -->
          </div>
        </div>
      </div>

      <!-- Device Metrics Row -->
      <div class="grid grid-cols-5 gap-6 device-metrics-section">
        
        <!-- Uptime Card (20% Width) -->
        <div class="bg-gray-700/50 rounded-lg p-4 flex flex-col items-center justify-center">
          <svg class="w-6 h-6 text-gray-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <h3 class="text-xs font-semibold text-gray-300 uppercase mb-2 text-center">Uptime</h3>
          <div class="text-xl font-bold text-white metric-uptime text-center">--</div>
        </div>

        <!-- CPU Card (40% Width) -->
        <div class="col-span-2 bg-gray-700/50 rounded-lg p-4">
          <h3 class="text-sm font-semibold text-gray-300 uppercase mb-3 flex items-center">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z" />
            </svg>
            CPU (6h)
          </h3>
          <div class="h-40 relative">
            <div class="metric-cpu-chart"></div>
          </div>
        </div>

        <!-- Memory Card (40% Width) -->
        <div class="col-span-2 bg-gray-700/50 rounded-lg p-4">
          <h3 class="text-sm font-semibold text-gray-300 uppercase mb-3 flex items-center">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01" />
            </svg>
            Memory (6h)
          </h3>
          <div class="h-40 relative">
            <div class="metric-memory-chart"></div>
          </div>
        </div>

      </div>

      <!-- Sensors and Fans Row -->
      <div class="grid grid-cols-2 gap-6 mt-6 device-sensors-section" style="display: none;">
        
        <!-- Sensors Card (50% Width) -->
        <div class="bg-gray-700/50 rounded-lg p-4">
          <h3 class="text-sm font-semibold text-gray-300 uppercase mb-3 flex items-center">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
            </svg>
            Temperature Sensors
          </h3>
          <div class="sensors-container grid grid-cols-1 md:grid-cols-2 gap-3 max-h-96 overflow-y-auto">
            <!-- Sensor cards will be dynamically inserted here -->
          </div>
        </div>

        <!-- Fans Card (50% Width) -->
        <div class="bg-gray-700/50 rounded-lg p-4">
          <h3 class="text-sm font-semibold text-gray-300 uppercase mb-3 flex items-center">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
            Fans
          </h3>
          <div class="fans-container grid grid-cols-1 md:grid-cols-2 gap-3 max-h-96 overflow-y-auto">
            <!-- Fan cards will be dynamically inserted here -->
          </div>
        </div>

      </div>

      <!-- Interfaces Row (Full Width) -->
      <div class="mt-6 device-interfaces-section" style="display: none;">
        <div class="bg-gray-700/50 rounded-lg p-4">
          <h3 class="text-sm font-semibold text-gray-300 uppercase mb-3 flex items-center">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            Network Interfaces
          </h3>
          <div class="interfaces-container grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 lg:grid-cols-10 xl:grid-cols-12 gap-3">
            <!-- Interface cards will be dynamically inserted here -->
          </div>
        </div>
      </div>
    </div>
  </template>
</body>
</html>
