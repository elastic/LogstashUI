<!-- Commit Configuration Modal -->
<div id="commitModal" class="hidden fixed inset-0 overflow-hidden z-50">
  <div class="absolute inset-0 bg-black/30 backdrop-blur-sm" onclick="closeCommitModal()"></div>
  <div class="absolute inset-0 flex items-center justify-center p-4">
    <div class="bg-gray-800 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
      <!-- Modal Header -->
      <div class="flex justify-between items-center p-6 border-b border-gray-700">
        <h2 class="text-xl font-bold text-white">Commit SNMP Configuration</h2>
        <button onclick="closeCommitModal()" class="text-gray-400 hover:text-white">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Modal Body -->
      <div class="p-6">
        <div class="space-y-4">
          <p class="text-gray-300">
            This will generate and commit your SNMP configuration based on your current devices, networks, credentials, and profiles.
          </p>

          <div class="bg-blue-900/30 rounded-lg p-4 border border-blue-700">
            <div class="flex items-start">
              <svg class="w-5 h-5 text-blue-400 mt-0.5 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
              <div>
                <h4 class="font-semibold text-blue-300 mb-1">Note</h4>
                <p class="text-gray-300 text-sm">
                  This will build the Logstash pipeline configuration for all your SNMP networks and push it to your configured Logstash instances.
                </p>
              </div>
            </div>
          </div>

          <!-- Response Message Area -->
          <div id="commitResponseMessage" class="hidden"></div>
        </div>
      </div>

      <!-- Modal Footer -->
      <div class="flex justify-end gap-3 p-6 border-t border-gray-700">
        <button type="button" onclick="closeCommitModal()" class="btn btn-secondary">
          Cancel
        </button>
        <button type="button" id="commitConfirmBtn" onclick="confirmCommit()" class="btn btn-primary">
          <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
          </svg>
          Commit Configuration
        </button>
      </div>
    </div>
  </div>
</div>
