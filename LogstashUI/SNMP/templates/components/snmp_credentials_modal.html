<!-- SNMP Credential Form Modal -->
  <div id="credentialFormModal" class="hidden fixed inset-0 overflow-hidden" style="z-index: 70;">
    <div class="absolute inset-0 bg-black/30 backdrop-blur-sm" onclick="closeCredentialModal()"></div>
    <div class="absolute inset-y-0 right-0 max-w-full flex">
      <div class="w-full max-w-md bg-base-200 shadow-xl flex flex-col h-full">
        <div class="flex justify-between items-center p-6 border-b border-base-300">
          <h2 id="modalTitle" class="text-xl font-bold">Add SNMP Credential</h2>
          <button onclick="closeCredentialModal()" class="btn btn-ghost btn-sm btn-circle">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
        <div class="flex-1 overflow-y-auto p-6">
          <!-- Error message container -->
          <div id="credentialErrorContainer"></div>
          
          <form id="credentialForm">
            <input type="hidden" id="credentialId" name="credential_id">
            
            <!-- Credential Name -->
            <div class="mb-4">
              <label for="credentialName" class="block text-sm font-medium text-gray-300 mb-2">
                Credential Name <span class="text-red-500">*</span>
              </label>
              <input type="text" id="credentialName" name="name" class="input input-bordered w-full" required placeholder="e.g., Production SNMP">
              <p class="text-gray-400 text-xs mt-1">A descriptive name for this credential</p>
            </div>

            <!-- Description -->
            <div class="mb-4">
              <label for="credentialDescription" class="block text-sm font-medium text-gray-300 mb-2">Description</label>
              <textarea id="credentialDescription" name="description" class="textarea textarea-bordered w-full" rows="2" placeholder="Optional description"></textarea>
            </div>

            <!-- SNMP Version -->
            <div class="mb-4">
              <label class="block text-sm font-medium text-gray-300 mb-2">SNMP Version <span class="text-red-500">*</span></label>
              <div class="flex gap-4">
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="radio" name="version" value="1" class="radio radio-primary" onchange="updateVersionFields()">
                  <span class="text-gray-300">SNMPv1</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="radio" name="version" value="2c" class="radio radio-primary" checked onchange="updateVersionFields()">
                  <span class="text-gray-300">SNMPv2c</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="radio" name="version" value="3" class="radio radio-primary" onchange="updateVersionFields()">
                  <span class="text-gray-300">SNMPv3</span>
                </label>
              </div>
            </div>

            <!-- SNMPv1/v2c Fields -->
            <div id="communityFields">
              <div class="mb-4">
                <label for="community" class="block text-sm font-medium text-gray-300 mb-2">
                  Community String <span class="text-red-500">*</span>
                </label>
                <input type="text" id="community" name="community" class="input input-bordered w-full" value="public" placeholder="public">
                <p class="text-gray-400 text-xs mt-1">Default: public</p>
              </div>
            </div>

            <!-- SNMPv3 Fields -->
            <div id="snmpv3Fields" class="hidden">
              <div class="mb-4">
                <label for="securityName" class="block text-sm font-medium text-gray-300 mb-2">
                  Security Name (Username) <span class="text-red-500">*</span>
                </label>
                <input type="text" id="securityName" name="security_name" class="input input-bordered w-full" placeholder="snmp-user">
              </div>

              <div class="mb-4">
                <label class="block text-sm font-medium text-gray-300 mb-2">Security Level <span class="text-red-500">*</span></label>
                <select id="securityLevel" name="security_level" class="select select-bordered w-full" onchange="updateSecurityFields()">
                  <option value="">Select security level</option>
                  <option value="noAuthNoPriv">No Authentication, No Privacy</option>
                  <option value="authNoPriv">Authentication, No Privacy</option>
                  <option value="authPriv">Authentication and Privacy</option>
                </select>
              </div>

              <!-- Authentication Fields -->
              <div id="authFields" class="hidden">
                <div class="mb-4">
                  <label for="authProtocol" class="block text-sm font-medium text-gray-300 mb-2">
                    Authentication Protocol <span class="text-red-500">*</span>
                  </label>
                  <select id="authProtocol" name="auth_protocol" class="select select-bordered w-full">
                    <option value="">Select protocol</option>
                    <option value="md5">MD5</option>
                    <option value="sha">SHA</option>
                    <option value="sha2">SHA2</option>
                    <option value="hmac128sha224">HMAC128-SHA224</option>
                    <option value="hmac192sha256">HMAC192-SHA256</option>
                    <option value="hmac256sha384">HMAC256-SHA384</option>
                    <option value="hmac384sha512">HMAC384-SHA512</option>
                  </select>
                </div>

                <div class="mb-4">
                  <label for="authPass" class="block text-sm font-medium text-gray-300 mb-2">
                    Authentication Password <span class="text-red-500">*</span>
                  </label>
                  <input type="password" id="authPass" name="auth_pass" class="input input-bordered w-full" placeholder="••••••••">
                </div>
              </div>

              <!-- Privacy Fields -->
              <div id="privFields" class="hidden">
                <div class="mb-4">
                  <label for="privProtocol" class="block text-sm font-medium text-gray-300 mb-2">
                    Privacy Protocol <span class="text-red-500">*</span>
                  </label>
                  <select id="privProtocol" name="priv_protocol" class="select select-bordered w-full">
                    <option value="">Select protocol</option>
                    <option value="des">DES</option>
                    <option value="3des">3DES</option>
                    <option value="aes">AES</option>
                    <option value="aes128">AES128</option>
                    <option value="aes192">AES192</option>
                    <option value="aes256">AES256</option>
                    <option value="aes256with3desKey">AES256 with 3DES Key</option>
                  </select>
                </div>

                <div class="mb-4">
                  <label for="privPass" class="block text-sm font-medium text-gray-300 mb-2">
                    Privacy Password <span class="text-red-500">*</span>
                  </label>
                  <input type="password" id="privPass" name="priv_pass" class="input input-bordered w-full" placeholder="••••••••">
                </div>
              </div>
            </div>

            <div class="form-actions pt-6 mt-6 border-t border-gray-700">
              <button type="button" onclick="closeCredentialModal()" class="btn btn-secondary">
                Cancel
              </button>
              <button type="submit" class="btn btn-primary">
                Save Credential
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
