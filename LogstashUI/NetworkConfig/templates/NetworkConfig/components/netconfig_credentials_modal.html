<!-- Network Config Credential Form Modal -->
<div id="ncCredentialFormModal" class="hidden fixed inset-0 overflow-hidden" style="z-index: 70;">
  <div class="absolute inset-0 bg-black/30 backdrop-blur-sm" onclick="closeCredentialModal()"></div>
  <div class="absolute inset-y-0 right-0 max-w-full flex">
    <div class="w-full max-w-md bg-base-200 shadow-xl flex flex-col h-full">
      <div class="flex justify-between items-center p-6 border-b border-base-300">
        <h2 id="ncCredModalTitle" class="text-xl font-bold">Add Network Credential</h2>
        <button onclick="closeCredentialModal()" class="btn btn-ghost btn-sm btn-circle">
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="flex-1 overflow-y-auto p-6">
        <div id="ncCredentialErrorContainer"></div>

        <form id="ncCredentialForm">
          {% csrf_token %}
          <input type="hidden" id="ncCredentialId" name="credential_id">

          <!-- Name -->
          <div class="mb-4">
            <label for="ncCredentialName" class="block text-sm font-medium text-gray-300 mb-2">
              Credential Name <span class="text-red-500">*</span>
            </label>
            <input type="text" id="ncCredentialName" name="name" class="input input-bordered w-full" required placeholder="e.g., Prod RESTCONF">
          </div>

          <!-- Description -->
          <div class="mb-4">
            <label for="ncCredentialDescription" class="block text-sm font-medium text-gray-300 mb-2">Description</label>
            <textarea id="ncCredentialDescription" name="description" class="textarea textarea-bordered w-full" rows="2" placeholder="Optional description"></textarea>
          </div>

          <!-- Protocol -->
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-300 mb-2">Protocol <span class="text-red-500">*</span></label>
            <select id="ncProtocol" name="protocol" class="select select-bordered w-full">
              <option value="restconf">RESTCONF</option>
              <option value="netconf">NETCONF</option>
              <option value="rest">Vendor REST API</option>
            </select>
          </div>

          <!-- Auth Type -->
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-300 mb-2">Auth Type <span class="text-red-500">*</span></label>
            <select id="ncAuthType" name="auth_type" class="select select-bordered w-full" onchange="updateNCAuthFields()">
              <option value="basic">HTTP Basic Auth</option>
              <option value="token">Bearer Token</option>
              <option value="api_key">API Key</option>
            </select>
          </div>

          <!-- Basic Auth Fields -->
          <div id="ncBasicFields">
            <div class="mb-4">
              <label for="ncUsername" class="block text-sm font-medium text-gray-300 mb-2">Username</label>
              <input type="text" id="ncUsername" name="username" class="input input-bordered w-full" placeholder="admin">
            </div>
            <div class="mb-4">
              <label for="ncPassword" class="block text-sm font-medium text-gray-300 mb-2">Password</label>
              <input type="password" id="ncPassword" name="password" class="input input-bordered w-full" placeholder="••••••••">
              <p class="text-gray-400 text-xs mt-1">Leave blank to keep existing password when editing</p>
            </div>
          </div>

          <!-- Token Fields -->
          <div id="ncTokenFields" class="hidden">
            <div class="mb-4">
              <label for="ncToken" class="block text-sm font-medium text-gray-300 mb-2">Bearer Token</label>
              <input type="password" id="ncToken" name="token" class="input input-bordered w-full" placeholder="••••••••">
              <p class="text-gray-400 text-xs mt-1">Leave blank to keep existing token when editing</p>
            </div>
          </div>

          <!-- API Key Fields -->
          <div id="ncApiKeyFields" class="hidden">
            <div class="mb-4">
              <label for="ncApiKeyHeader" class="block text-sm font-medium text-gray-300 mb-2">API Key Header Name</label>
              <input type="text" id="ncApiKeyHeader" name="api_key_header" class="input input-bordered w-full" value="X-API-Key" placeholder="X-API-Key">
            </div>
            <div class="mb-4">
              <label for="ncApiKeyToken" class="block text-sm font-medium text-gray-300 mb-2">API Key Value</label>
              <input type="password" id="ncApiKeyToken" name="token" class="input input-bordered w-full" placeholder="••••••••">
              <p class="text-gray-400 text-xs mt-1">Leave blank to keep existing key when editing</p>
            </div>
          </div>

          <!-- SSL -->
          <div class="mb-4">
            <label class="flex items-center gap-3 cursor-pointer">
              <input type="checkbox" id="ncVerifySsl" name="verify_ssl" value="true" class="checkbox checkbox-primary" checked>
              <span class="text-sm text-gray-300">Verify SSL Certificate</span>
            </label>
            <p class="text-gray-400 text-xs mt-1">Uncheck for self-signed certificates</p>
          </div>

          <div class="form-actions pt-6 mt-6 border-t border-gray-700 flex justify-between">
            <button type="button" onclick="closeCredentialModal()" class="btn btn-secondary">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Credential</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
