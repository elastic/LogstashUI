input {
  generator {
    id => "gen_edgeA"
    count => 1
    lines => [
      '2026-02-22T01:23:45Z level=INFO service=api trace.id=abc123 method=GET path="/api/v2/items/42" ip=8.8.8.8 ua="Mozilla/5.0 (Windows NT 10.0; Win64; x64)" msg="hello\\world"'
    ]
    add_field => {
      "[@metadata][source]" => "generator"
      "event.original" => "%{message}"
    }
  }
}

filter {
  # Fast split: timestamp + remainder
  dissect {
    id => "dissect_ts_rest"
    mapping => { "message" => "%{ts} %{rest}" }
    tag_on_failure => ["_dissectfailure_ts_rest"]
  }

  date {
    id => "date_ts"
    match => ["ts", "ISO8601"]
    tag_on_failure => ["_dateparsefailure_ts"]
  }

  # Parse key=value in rest
  kv {
    id => "kv_rest"
    source => "rest"
    trim_key => " "
    trim_value => " "
    value_split => "="
    field_split_pattern => "\\s+"
    include_brackets => false
    tag_on_failure => ["_kvfailure_rest"]
  }

  # Normalize: remove surrounding quotes on selected fields (common log format)
  mutate {
    id => "mutate_strip_quotes"
    gsub => [
      "path", '^"|"$', "",
      "ua",   '^"|"$', "",
      "msg",  '^"|"$', ""
    ]
  }

  # Promote a few fields into ECS-ish places
  mutate {
    id => "mutate_promote"
    rename => {
      "ip"     => "[source][ip]"
      "ua"     => "[user_agent][original]"
      "method" => "[http][request][method]"
      "path"   => "[url][path]"
      "trace.id" => "[trace][id]"
    }
    lowercase => ["level"]
  }

  # Route key uses nested refs in sprintf (great UI test)
  mutate {
    id => "mutate_route_key"
    add_field => {
      "route_key" => "%{[@metadata][source]}::%{[service]}::%{[http][request][method]}::%{[url][path]}"
    }
  }

  # Regex literals (escaped slashes)
  if [url][path] =~ /^\/api\/v2\/items\/[0-9]+$/ {
    mutate { id => "tag_items" add_tag => ["route_items"] }
  } else if [url][path] =~ /^\/api\/v2\/[A-Za-z0-9._-]+$/ {
    mutate { id => "tag_api_generic" add_tag => ["route_api_generic"] }
  } else {
    mutate { id => "tag_other" add_tag => ["route_other"] }
  }

  # useragent parsing
  if [user_agent][original] {
    useragent {
      id => "ua_parse"
      source => "[user_agent][original]"
      target => "[user_agent][parsed]"
    }
  }

  # geoip on public source.ip
  if [source][ip] {
    geoip {
      id => "geoip_source"
      source => "[source][ip]"
      target => "[source][geo]"
    }
  }

  # fingerprint based on nested refs + message
  fingerprint {
    id => "fp_event"
    source => ["route_key", "message"]
    method => "MURMUR3"
    target => "[@metadata][fp]"
  }

  # Replace literal backslash with slash in msg (escape-heavy but valid)
  mutate {
    id => "mutate_gsub_backslash"
    gsub => [ "msg", "\\\\", "/" ]
  }

  prune {
    id => "prune_edgeA"
    whitelist_names => [
      "^@timestamp$",
      "^message$",
      "^tags$",
      "^level$",
      "^service$",
      "^route_key$",
      "^trace\\..*$",
      "^http\\..*$",
      "^url\\..*$",
      "^source\\..*$",
      "^user_agent\\..*$",
      "^msg$",
      "^@metadata\\..*$"
    ]
  }
}

output {
  stdout { codec => rubydebug { metadata => true } }
  file {
    path => "/tmp/edgeA-%{+YYYY.MM.dd}.jsonl"
    codec => json_lines
  }
}