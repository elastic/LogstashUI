    row['cdpCacheVersion'] = row.delete('1.3.6.1.4.1.9.9.23.1.2.1.1.5')
    row['cdpCacheAddress'] = row.delete('1.3.6.1.4.1.9.9.23.1.2.1.1.4')
    new_event = LogStash::Event.new({
      '@timestamp' => timestamp,
      'host' => { 'name' => host_name, 'hostname' => host_hostname },
      'network' => { 'name' => network_name },
      'table' => row,
      'metricset' => { 'module' => 'snmp' },
      'event' => { 'kind' => 'cdpcachetable' }
    })
    new_event_block.call(new_event)
  end
  event.remove('[cdpCacheTable]')
  event.set('[event][kind]', 'metrics')
end"
