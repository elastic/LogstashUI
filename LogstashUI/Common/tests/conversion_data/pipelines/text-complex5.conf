input {
	generator {
		id => "gen_edgecase_3"
		count => 1
		lines => ["path=\"C:\\Program Files\\App\\\" msg=\"quote:\" and backslash:\\\\\""]
	}
}
filter {
	# This ruby code contains both quote styles and backslashes.
	ruby {
		id => "ruby_edgecase_3"
		code => '
	      # Double quotes inside single-quoted LSCL string
	      event.set("[edge][note]", "He said: "hello"")
	      # Single quote inside Ruby string
	      event.set("[edge][apostrophe]", "it\'s fine")
	      # Trailing backslash in a field value (nasty for serializers)
	      event.set("[edge][trail]", "C:	emp")
	    '
	}
	# Parse key=val
	kv {
		id => "kv_edgecase_3"
		source => "message"
		value_split => "="
		field_split_pattern => "\s+"
	}
	# Replace literal backslash "\" with "/"
	mutate {
		id => "gsub_edgecase_3"
		gsub => ["path", "\\\\", "/"]
	}
}
output {
	stdout {
		codec => rubydebug {
			metadata => "true"
		}
	}
}
