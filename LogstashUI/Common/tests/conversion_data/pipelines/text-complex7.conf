input {
	beats {
		id => "input_beats_1"
		port => "5044"
		ssl => "true"
		ssl_certificate => "/etc/logstash/certs/logstash.crt"
		ssl_key => "/etc/logstash/certs/logstash.key"
		codec => json
		tags => ["beats_input", "app_log"]
	}
	udp {
		id => "input_udp_1"
		port => "5140"
		buffer_size => "8192"
		codec => plain {
			charset => "UTF-8"
		}
		type => "network_flow"
		tags => ["udp_input", "unstructured"]
	}
	jdbc {
		id => "input_jdbc_1"
		jdbc_driver_library => "/usr/share/logstash/logstash-core/lib/jars/postgresql-42.2.8.jar"
		jdbc_driver_class => "org.postgresql.Driver"
		jdbc_connection_string => "jdbc:postgresql://db.example.com:5432/config_db"
		jdbc_user => "logstash_user"
		jdbc_password => "${JDBC_PASSWORD}"
		schedule => "0 * * * *"
		statement => "SELECT id, user_name, config_item, change_timestamp FROM config_changes WHERE change_timestamp > :sql_last_value ORDER BY change_timestamp ASC"
		use_column_value => "true"
		tracking_column => "change_timestamp"
		tracking_column_type => "timestamp"
		last_run_metadata_path => "/var/lib/logstash/.jdbc_last_run_config_db"
		type => "config_audit"
		tags => ["jdbc_input", "audit"]
	}
}
filter {
	mutate {
		id => "filter_mutate_1"
		rename => {
			"@timestamp" => "log_recv_time"
		}
		add_field => {
			"severity" => "INFO"
		}
	}
	if "app_log" in [tags] {
		if "_jsonparsefailure" in [tags] {
			grok {
				id => "filter_grok_1"
				match => {
					"message" => "(?\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3}) \[%{DATA:thread}] %{LOGLEVEL:log_level} %{DATA:logger} - %{GREEDYDATA:log_message}"
				}
				add_tag => ["grok_fallback_success"]
				remove_tag => ["_jsonparsefailure"]
			}
		}
		if [log_level] {
			mutate {
				id => "filter_mutate_2"
				uppercase => ["log_level"]
				copy => {
					"log_level" => "severity"
				}
			}
		}
		if [severity] =~ /(WARNING|ERROR|FATAL)/ {
			geoip {
				id => "filter_geoip_1"
				source => "[fields][source_ip]"
				target => "geo"
				database => "/etc/logstash/geoip/GeoLite2-City.mmdb"
				remove_field => ["continent_code", "location"]
			}
			translate {
				id => "filter_translate_1"
				field => "[service_code]"
				destination => "service_name"
				dictionary_path => "/etc/logstash/dictionaries/service_codes.csv"
				fallback => "Unknown Service"
				refresh_interval => "300"
			}
		}
		mutate {
			id => "filter_mutate_3"
			remove_field => ["message", "agent"]
		}
	}
	else if [type] == "network_flow" {
		grok {
			id => "filter_grok_2"
			match => {
				"message" => "%{NETFLOW_V9}"
			}
			on_failure => ["_netflowparsefailure"]
		}
		if "_netflowparsefailure" in [tags] {
			mutate {
				id => "filter_mutate_4"
				add_tag => ["unparsed_flow"]
				remove_tag => ["_grokparsefailure", "_netflowparsefailure"]
				copy => {
					"message" => "unparsed_data"
				}
				replace => {
					"message" => "Truncated unparsed flow data."
				}
			}
		}
		else {
			aggregate {
				id => "filter_aggregate_1"
				task_id => "%{source_ip}_%{destination_ip}_%{protocol}"
				code => "map['total_packets'] ||= 0; map['total_packets'] += event.get('packets').to_i; map['total_bytes'] ||= 0; map['total_bytes'] += event.get('bytes').to_i"
				map_action => "create_or_update"
				push_map_as_event_on_timeout => "true"
				timeout => "120"
				timeout_task_id_field => "aggregated_flow_id"
				timeout_tags => ["_aggregate_timeout"]
			}
		}
	}
	else if [type] == "config_audit" {
		if [change_timestamp] {
			date {
				id => "filter_date_1"
				match => ["change_timestamp", "YYYY-MM-dd HH:mm:ss.SSSSSS"]
				target => "@timestamp"
				remove_field => ["change_timestamp"]
			}
			if [user_name] != "system" {
				ruby {
					id => "filter_ruby_1"
					code => "event.set('user_hash', Digest::MD5.hexdigest(event.get('user_name')))"
				}
				mutate {
					id => "filter_mutate_5"
					remove_field => ["user_name"]
				}
			}
		}
	}
	if "_grokparsefailure" in [tags] or "_jsonparsefailure" in [tags] {
		mutate {
			id => "filter_mutate_6"
			add_field => {
				"log_status" => "FAILED_TO_PARSE"
			}
		}
	}
	else {
		mutate {
			id => "filter_mutate_7"
			add_field => {
				"log_status" => "PROCESSED"
			}
		}
	}
	if [log_recv_time] < now() - 86400000 {
		drop {
			id => "filter_drop_1"
		}
	}
}
output {
	if [log_status] == "PROCESSED" and [severity] =~ /(ERROR|FATAL)/ {
		elasticsearch {
			id => "output_elasticsearch_1"
			hosts => ["https://es-hot.example.com:9200"]
			index => "high-priority-%{+YYYY.MM.dd}"
			user => "logstash_writer"
			password => "secure_password"
			ssl => "true"
			cacert => "/etc/logstash/certs/ca.crt"
			action => "index"
		}
	}
	else if [log_status] == "PROCESSED" {
		elasticsearch {
			id => "output_elasticsearch_2"
			hosts => ["https://es-warm.example.com:9200"]
			index => "general-logs-%{+YYYY.MM.dd}"
			user => "logstash_writer"
			password => "secure_password"
			ssl => "true"
			cacert => "/etc/logstash/certs/ca.crt"
			workers => "4"
			ilm_enabled => "false"
		}
	}
	if [log_status] == "FAILED_TO_PARSE" {
		file {
			id => "output_file_1"
			path => "/var/log/logstash/dlq_failures.json"
			codec => json {
				pretty => "true"
			}
			add_tag => ["dlq_routed"]
		}
	}
	if "_aggregate_timeout" in [tags] {
		tcp {
			id => "output_tcp_1"
			host => "alert-sys.example.com"
			port => "6514"
			codec => gelf {
				protocol => "TCP"
				short_message => "Aggregated Flow Timeout: %{aggregated_flow_id}"
			}
			socket_timeout => "5"
		}
	}
	if rand(100) < 1 {
		stdout {
			id => "output_stdout_1"
			codec => rubydebug {
				metadata => "true"
			}
		}
	}
}
