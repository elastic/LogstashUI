{% extends "base.html" %}

{% block content %}
<script>
  // Configure HTMX to include CSRF token in all requests
  document.body.addEventListener('htmx:configRequest', (event) => {
    event.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
  });
</script>
<div class="p-6">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-white">User Management</h1>
    <button onclick="document.getElementById('addUserModal').classList.remove('hidden')"
            class="btn btn-primary flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
      </svg>
      Add User
    </button>
  </div>

  <div class="bg-gray-800 rounded-lg shadow-xl overflow-hidden">
    <table class="table w-full">
      <thead>
        <tr class="bg-gray-700 border-b border-gray-600">
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">Username</th>
          <th class="px-6 py-3 text-right text-xs font-medium text-gray-300 uppercase tracking-wider">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-700" id="userTableBody">
        {% for user in users %}
        <tr class="hover:bg-gray-700/50 transition-colors">
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-300">
            {{ user.username }}
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
            <div class="flex justify-end space-x-2">
              <button onclick="openEditModal('{{ user.id }}', '{{ user.username }}')"
                      class="text-blue-400 hover:text-blue-300 mr-3">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                </svg>
              </button>
              <button hx-post="{% url 'Users' %}" 
                      hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'  
                      hx-vals='{"action": "delete", "user_id": "{{ user.id }}"}'
                      hx-target="#userTableBody"
                      hx-confirm="Are you sure you want to delete this user?"
                      class="text-red-400 hover:text-red-300">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
              </button>
            </div>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

<!-- Add User Modal -->
<div id="addUserModal" class="hidden fixed inset-0 z-50 overflow-y-auto">
  <div class="absolute inset-0 bg-black/30 backdrop-blur-sm" onclick="closeAddModal()"></div>
  <div class="flex items-center justify-center min-h-screen p-4">
    <div class="relative bg-base-200 rounded-lg shadow-xl w-full max-w-md">
      <div class="flex justify-between items-center p-6 border-b border-base-300">
        <h2 class="text-xl font-bold">Add New User</h2>
        <button onclick="closeAddModal()" class="btn btn-ghost btn-sm btn-circle">
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="p-6">
        <div id="addUserError"></div>
        <form hx-post="{% url 'Users' %}" 
              hx-vals='{"action": "add"}'
              hx-target="#addUserError">
          {% csrf_token %}
          <div class="mb-4">
            <label class="block text-gray-300 text-sm font-medium mb-2" for="username">
              Username
            </label>
            <input type="text" id="username" name="username" required
                   class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-md text-white focus:outline-none focus:ring-2 focus:ring-primary">
          </div>
          <div class="mb-4">
            <label class="block text-gray-300 text-sm font-medium mb-2" for="email">
              Email (optional)
            </label>
            <input type="email" id="email" name="email"
                   class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-md text-white focus:outline-none focus:ring-2 focus:ring-primary">
          </div>
          <div class="mb-4">
            <label class="block text-gray-300 text-sm font-medium mb-2" for="password">
              Password
            </label>
            <input type="password" id="password" name="password" required
                   class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-md text-white focus:outline-none focus:ring-2 focus:ring-primary">
          </div>
          <div class="flex items-center justify-end space-x-3 pt-6 mt-6 border-t border-gray-700">
            <button type="button" onclick="closeAddModal()"
                    class="btn btn-secondary">
              Cancel
            </button>
            <button type="submit"
                    class="btn btn-primary">
              Add User
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Edit User Modal -->
<div id="editUserModal" class="hidden fixed inset-0 z-50 overflow-y-auto">
  <div class="absolute inset-0 bg-black/30 backdrop-blur-sm" onclick="closeEditModal()"></div>
  <div class="flex items-center justify-center min-h-screen p-4">
    <div class="relative bg-base-200 rounded-lg shadow-xl w-full max-w-md">
      <div class="flex justify-between items-center p-6 border-b border-base-300">
        <h2 class="text-xl font-bold">Edit User: <span id="editUsername"></span></h2>
        <button onclick="closeEditModal()" class="btn btn-ghost btn-sm btn-circle">
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="p-6">
        <div id="editUserError"></div>
        <form hx-post="{% url 'Users' %}" 
              hx-vals='{"action": "update"}'
              hx-target="#editUserError">
          {% csrf_token %}
          <input type="hidden" id="editUserId" name="user_id">
          <div class="mb-4">
            <label class="block text-gray-300 text-sm font-medium mb-2" for="newPassword">
              New Password
            </label>
            <input type="password" id="newPassword" name="new_password" required
                   class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-md text-white focus:outline-none focus:ring-2 focus:ring-primary">
          </div>
          <div class="flex items-center justify-end space-x-3 pt-6 mt-6 border-t border-gray-700">
            <button type="button" onclick="closeEditModal()"
                    class="btn btn-secondary">
              Cancel
            </button>
            <button type="submit"
                    class="btn btn-primary">
              Update User
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
function openEditModal(userId, username) {
  document.getElementById('editUserId').value = userId;
  document.getElementById('editUsername').textContent = username;
  document.getElementById('editUserModal').classList.remove('hidden');
}

function closeAddModal() {
  document.getElementById('addUserModal').classList.add('hidden');
  document.getElementById('addUserError').innerHTML = '';
  document.querySelector('#addUserModal form').reset();
}

function closeEditModal() {
  document.getElementById('editUserModal').classList.add('hidden');
  document.getElementById('editUserError').innerHTML = '';
  document.querySelector('#editUserModal form').reset();
}

function showToast(message, type = 'success') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  const colors = {
    success: 'bg-green-500',
    error: 'bg-red-500',
    info: 'bg-blue-500',
    warning: 'bg-yellow-500'
  };

  toast.className = `${colors[type] || 'bg-gray-800'} text-white px-6 py-3 rounded-lg shadow-lg flex items-center justify-between min-w-[300px]`;
  toast.innerHTML = `
    <span>${message}</span>
    <button onclick="this.parentElement.remove()" class="text-white hover:text-gray-200 ml-4">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  `;

  container.appendChild(toast);

  // Auto-remove after 5 seconds
  setTimeout(() => {
    toast.style.opacity = '0';
    setTimeout(() => toast.remove(), 300);
  }, 5000);
}
</script>
{% endblock %}
