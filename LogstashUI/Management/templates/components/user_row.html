{% load static %}
<tr class="hover:bg-gray-700/50 transition-colors">
  <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-300">
    {{ user.username }}
  </td>
  <td class="px-6 py-4 whitespace-nowrap text-sm">
    {% if user.profile.role == 'admin' %}
      <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-900/50 text-blue-300 border border-blue-700">
        Admin
      </span>
    {% else %}
      <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-700 text-gray-300 border border-gray-600">
        Readonly
      </span>
    {% endif %}
  </td>
  <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
    <div class="action-menu relative">
      <button class="action-menu-button p-1 hover:bg-gray-700 rounded">
        <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
          <path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z" />
        </svg>
      </button>
      <div class="action-menu-items hidden fixed z-50 w-48 bg-gray-800 rounded-md shadow-lg py-1" role="menu" style="transform: translate(-50%, 0);">
        <div class="px-1 py-1">
          <button onclick="openPasswordModal('{{ user.id }}', '{{ user.username }}')"
             class="w-full group flex items-center px-4 py-2 text-sm text-blue-400 hover:bg-gray-700 rounded-md"
             role="menuitem"
             type="button">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
            </svg>
            Update Password
          </button>
          <button onclick="openRoleModal('{{ user.id }}', '{{ user.username }}', '{{ user.profile.role }}')"
             class="w-full group flex items-center px-4 py-2 text-sm text-green-400 hover:bg-gray-700 rounded-md"
             role="menuitem"
             type="button">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
            Update Role
          </button>
          <button hx-post="{% url 'Users' %}" 
             hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'  
             hx-vals='{"action": "delete", "user_id": "{{ user.id }}"}'
             hx-target="#userTableBody"
             hx-confirm="Are you sure you want to delete this user?"
             class="w-full group flex items-center px-4 py-2 text-sm text-red-400 hover:bg-gray-700 rounded-md"
             role="menuitem"
             type="button">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
            Delete
          </button>
        </div>
      </div>
    </div>
  </td>
</tr>
