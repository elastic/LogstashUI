{% extends "base.html" %}

{% block content %}
<div class="p-6">
  <div class="page-header">
    <h1 class="page-title">Pipelines</h1>
  </div>

  <div class="table-container mt-6">
    <table class="table w-full">
      <thead class="table-header">
        <tr>
          <th scope="col" class="table-header-cell">Pipeline Name</th>
          <th scope="col" class="table-header-cell">Elasticsearch</th>
          <th scope="col" class="table-header-cell text-right">Actions</th>
        </tr>
      </thead>
      <tbody class="table-body">
        {% for pipeline in pipelines %}
        <tr class="table-row">
          <td class="table-cell">
            <a href="/PipelineManager/Pipelines/Editor?es_id={{ pipeline.es_id }}&pipeline={{ pipeline.name }}" class="text-blue-400 hover:text-blue-300 hover:underline">
              {{ pipeline.name }}
            </a>
          </td>
          <td class="table-cell">
            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-700 text-gray-200">
              {{ pipeline.es_name }}
            </span>
          </td>
          <td class="table-cell text-right">
            <div class="action-menu">
              <button class="action-menu-button p-1 hover:bg-gray-700 rounded">
                <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
                  <path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z" />
                </svg>
              </button>
              <div class="action-menu-items hidden absolute z-50 mt-1 w-32 bg-gray-800 rounded-md shadow-lg py-1" role="menu">
                <a href="#" class="block px-4 py-2 text-sm text-gray-200 hover:bg-gray-700" role="menuitem">
                  Edit
                </a>
                <a href="#" class="block px-4 py-2 text-sm text-red-400 hover:bg-gray-700" role="menuitem">
                  Delete
                </a>
              </div>
            </div>
          </td>
        </tr>
        {% empty %}
        <tr>
          <td colspan="3" class="px-6 py-4 text-center text-gray-400">
            No pipelines found. Add a connection to view pipelines.
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

<script>
// Action menu functionality
function setupActionMenus() {
  document.querySelectorAll('.action-menu-button').forEach(button => {
    button.addEventListener('click', (e) => {
      e.stopPropagation();
      const menu = button.nextElementSibling;
      const isShown = !menu.classList.contains('hidden');

      // Close all other open menus
      document.querySelectorAll('.action-menu-items').forEach(m => {
        if (m !== menu) m.classList.add('hidden');
      });

      // Toggle current menu
      menu.classList.toggle('hidden', isShown);
    });
  });

  // Close menu when clicking outside
  document.addEventListener('click', () => {
    document.querySelectorAll('.action-menu-items').forEach(menu => {
      menu.classList.add('hidden');
    });
  });
}

// Initialize action menus when the document is loaded
document.addEventListener('DOMContentLoaded', setupActionMenus);
</script>
{% endblock %}
