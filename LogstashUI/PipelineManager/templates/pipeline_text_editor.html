<!-- CodeMirror CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css">

<div class="flex flex-col" style="height: calc(100vh - 280px);">
    <div class="mb-4">
        <h2 class="text-xl font-bold text-white mb-2">Pipeline Configuration</h2>
        <p class="text-sm text-gray-400">Edit your Logstash pipeline configuration directly in text format</p>
    </div>
    
    <!-- CodeMirror Editor Container -->
    <div class="flex-1 bg-gray-900 rounded-lg border border-gray-700 overflow-hidden" style="min-height: 500px;">
        <textarea 
            id="pipelineTextEditor" 
            placeholder="Enter your Logstash pipeline configuration here...
            
Example:
input {
  generator {
    count => 1
    lines => 'This is a test message'
  }
}

filter {
  mutate {
    add_tag => 'tag1'
  }
}

output {
  stdout {
    codec => rubydebug
  }
}"
            spellcheck="false"
        ></textarea>
    </div>
    
    <div class="mt-4 flex justify-between items-center">
        <div class="text-sm text-gray-400">
            <span id="lineCount">Lines: 0</span>
            <span class="mx-2">|</span>
            <span id="charCount">Characters: 0</span>
        </div>
    </div>
</div>
