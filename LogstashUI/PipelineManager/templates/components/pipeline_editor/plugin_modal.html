<!---TODO: When components are created via UI, they give an ID that doesn't match what the backend does. Let backend generate IDs? -->

<!-- Plugin Selection Modal -->
<div id="pluginModal" class="hidden fixed inset-0 flex items-center justify-center z-50 p-4">
  <div class="absolute inset-0 bg-black/30 backdrop-blur-sm" onclick="PluginModal.hide()"></div>
  <div class="bg-gray-800 rounded-lg w-full max-w-4xl max-h-[90vh] flex flex-col relative z-10">
    <!-- Modal Header -->
    <div class="p-4 border-b border-gray-700 flex justify-between items-center">
      <h3 id="pluginModalTitle" class="text-lg font-semibold text-white">Select Plugin</h3>
      <button onclick="PluginModal.hide()" class="text-gray-400 hover:text-white">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Search Bar and Filters -->
    <div class="p-4 border-b border-gray-700 space-y-3">
      <input type="text"
             id="pluginSearch"
             placeholder="Search plugins..."
             class="w-full p-2 bg-gray-700 border border-gray-600 rounded text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
      <div class="flex items-center gap-2">
        <label for="bundledFilter" class="text-sm text-gray-300">Bundled:</label>
        <select id="bundledFilter"
                class="p-2 bg-gray-700 border border-gray-600 rounded text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="all">All</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
      </div>
    </div>

    <!-- Plugin Grid Container -->
    <div class="flex-1 overflow-y-auto">
      <div id="pluginGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 p-4">
        <!-- Plugin cards will be inserted here by JavaScript -->
      </div>
    </div>
  </div>
</div>

<script>
// Plugin Modal Controller
const PluginModal = (function() {
  let currentPluginType = '';
  let pluginData = {};

  // Initialize the modal with plugin data
  function init(data) {
    pluginData = data;
    setupEventListeners();
  }

  // Show the modal for a specific plugin type
  function show(type) {
    currentPluginType = type;
    const modal = document.getElementById('pluginModal');
    const title = document.getElementById('pluginModalTitle');

    title.textContent = `Add ${type.charAt(0).toUpperCase() + type.slice(1)} Plugin`;
    renderPlugins(type);

    modal.classList.remove('hidden');
    document.getElementById('pluginSearch').focus();
  }

  // Hide the modal
  function hide() {
    document.getElementById('pluginModal').classList.add('hidden');
  }

  // Render plugins in the grid
  function renderPlugins(type) {
    const grid = document.getElementById('pluginGrid');
    const plugins = pluginData[type] || {};
    grid.innerHTML = '';

    Object.entries(plugins).forEach(([name, plugin]) => {
      const card = createPluginCard(name, plugin, type);
      grid.appendChild(card);
    });

    // Re-attach search handler
    setupSearch();
  }

  // Create a plugin card element
  function createPluginCard(name, plugin, type) {
    const card = document.createElement('div');
    card.className = 'bg-gray-700 rounded-lg overflow-hidden hover:shadow-lg transition-shadow';
    card.dataset.bundled = (plugin.bundled || 'No').toLowerCase();

    card.innerHTML = `
      <div class="p-4 h-full flex flex-col">
        <div class="flex justify-between items-start mb-2">
          <div class="flex items-center gap-2">
            <img src="/static/images/${name.toLowerCase()}.png" 
                 alt="${name} icon" 
                 class="w-6 h-6 object-contain"
                 onerror="this.style.display='none'"
            >
            <h4 class="font-medium text-white">${name}</h4>
          </div>
          <div class="flex gap-1">
            ${plugin.bundled === 'Yes' ?
              '<span class="text-xs bg-green-600 text-white px-2 py-1 rounded flex items-center gap-1" title="Bundled with Logstash"><svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>Bundled</span>' :
              '<span class="text-xs bg-gray-600 text-gray-300 px-2 py-1 rounded" title="Not bundled with Logstash">External</span>'}
            ${plugin.deprecated ?
              '<span class="text-xs bg-red-500 text-white px-2 py-1 rounded">Deprecated</span>' : ''}
          </div>
        </div>
        ${plugin.description ?
          `<p class="text-sm text-gray-300 mb-3 flex-1">${plugin.description}</p>` : ''}
        <div class="mt-auto pt-3 border-t border-gray-600">
          <div class="flex justify-between items-center">
            <button data-plugin="${name}" data-type="${type}"
                    class="select-plugin-btn px-3 py-1 bg-blue-600 text-white text-sm rounded hover:bg-blue-700">
              Add
            </button>
            <div class="flex space-x-2">
              ${plugin.link ? createIconLink(plugin.link, 'Documentation', 'info') : ''}
              ${plugin.repo_link ? createIconLink(plugin.repo_link, 'Source Code', 'code') : ''}
            </div>
          </div>
        </div>
      </div>
    `;

    // Add click handler for the Add button
    const btn = card.querySelector('.select-plugin-btn');
    if (btn) {
      btn.addEventListener('click', () => {
        if (window.selectPlugin) {
          window.selectPlugin(name, type);
          hide();
        }
      });
    }

    return card;
  }

  // Create an icon link
  function createIconLink(href, title, iconType) {
    const icons = {
      info: 'M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z',
      code: 'M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4'
    };

    return `
      <a href="${href}" target="_blank"
         class="text-gray-400 hover:text-white"
         title="${title}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="${icons[iconType] || icons.info}" />
        </svg>
      </a>
    `;
  }

  // Setup search functionality
  function setupSearch() {
    const searchInput = document.getElementById('pluginSearch');
    const bundledFilter = document.getElementById('bundledFilter');
    if (!searchInput) return;

    searchInput.value = '';
    if (bundledFilter) bundledFilter.value = 'all';

    const filterPlugins = () => {
      const searchTerm = searchInput.value.toLowerCase();
      const bundledValue = bundledFilter ? bundledFilter.value : 'all';
      const cards = document.querySelectorAll('#pluginGrid > div');

      cards.forEach(card => {
        const name = card.querySelector('h4')?.textContent?.toLowerCase() || '';
        const description = card.querySelector('p')?.textContent?.toLowerCase() || '';
        const bundled = card.dataset.bundled || 'no';
        
        const matchesSearch = name.includes(searchTerm) || description.includes(searchTerm);
        const matchesBundled = bundledValue === 'all' || bundled === bundledValue;
        
        card.style.display = (matchesSearch && matchesBundled) ? '' : 'none';
      });
    };

    searchInput.oninput = filterPlugins;
    if (bundledFilter) {
      bundledFilter.onchange = filterPlugins;
    }
  }

  // Setup event listeners
  function setupEventListeners() {
    // Handle plugin selection
    document.addEventListener('click', (e) => {
      // Handle plugin selection
      const selectBtn = e.target.closest('.select-plugin-btn');
      if (selectBtn) {
        e.preventDefault();
        e.stopPropagation();
        
        const pluginName = selectBtn.dataset.plugin;
        const pluginType = selectBtn.dataset.type;
        
        if (pluginName && pluginType) {
          // Get the modal element
          const modal = document.getElementById('pluginModal');
          
          // Check if we're in a conditional context
          if (modal.dataset.context) {
            const context = JSON.parse(modal.dataset.context);
            
            // Check if this is a conditional insertion point (nested inside a conditional)
            if (context.conditionalInsertion) {
              // Handle insertion inside a conditional block at specific position
              const parentComponent = findComponentById(context.conditionalId);
              if (!parentComponent) return;
              
              const newPlugin = {
                id: `plugin-${Date.now()}`,
                type: context.type,
                plugin: pluginName,
                config: {}
              };
              
              // Track the newly added plugin for animation
              if (typeof newlyAddedPluginId !== 'undefined') {
                newlyAddedPluginId = newPlugin.id;
              }
              
              // Mark animation as pending until config modal closes (BEFORE loadExistingComponents)
              if (typeof pendingAnimationPluginId !== 'undefined' && typeof newlyAddedPluginId !== 'undefined') {
                pendingAnimationPluginId = newlyAddedPluginId;
              }
              
              // Determine which plugin array to insert into
              let targetPlugins;
              switch (context.blockType) {
                case 'if':
                  if (!parentComponent.config.plugins) parentComponent.config.plugins = [];
                  targetPlugins = parentComponent.config.plugins;
                  break;
                case 'else_if':
                  if (!parentComponent.config.else_ifs || !parentComponent.config.else_ifs[context.elseIfIndex]) return;
                  if (!parentComponent.config.else_ifs[context.elseIfIndex].plugins) {
                    parentComponent.config.else_ifs[context.elseIfIndex].plugins = [];
                  }
                  targetPlugins = parentComponent.config.else_ifs[context.elseIfIndex].plugins;
                  break;
                case 'else':
                  if (!parentComponent.config.else) parentComponent.config.else = { plugins: [] };
                  if (!parentComponent.config.else.plugins) parentComponent.config.else.plugins = [];
                  targetPlugins = parentComponent.config.else.plugins;
                  break;
                default:
                  return;
              }
              
              // Insert at the specified index
              targetPlugins.splice(context.index, 0, newPlugin);
              
              // Clean up context
              delete modal.dataset.context;
              
              // Hide modal and refresh UI
              hide();
              loadExistingComponents();
              
              // Show config modal
              if (typeof window.PluginConfigModal !== 'undefined') {
                setTimeout(() => {
                  window.PluginConfigModal.show(newPlugin, true); // Pass true to indicate it's a new component
                }, 50);
              }
            } else {
              // This is a conditional block (for adding to if/else-if/else), dispatch an event with the plugin info
              const event = new CustomEvent('pluginSelected', {
                detail: {
                  pluginName,
                  pluginType
                }
              });
              
              // Store the context and clear it immediately to prevent issues
              const contextStr = modal.dataset.context;
              delete modal.dataset.context;
              
              // Close the modal first to avoid UI issues
              hide();
              
              // Dispatch the event with the stored context
              modal.dataset.context = contextStr;
              document.dispatchEvent(event);
              delete modal.dataset.context;
            }
          } else {
            // Regular plugin addition (non-conditional)
            // Check if we have insertion point data
            const insertIndex = modal.dataset.index ? parseInt(modal.dataset.index) : null;
            const insertType = modal.dataset.type || pluginType;
            const isConditional = modal.dataset.isConditional === 'true';
            const parentId = modal.dataset.parentId || null;
            
            const component = {
              id: `comp_${Date.now()}`,
              type: insertType,
              plugin: pluginName,
              config: {}
            };
            
            // Track the newly added plugin for animation
            if (typeof newlyAddedPluginId !== 'undefined') {
              newlyAddedPluginId = component.id;
            }
            
            // Mark animation as pending until config modal closes (BEFORE loadExistingComponents)
            if (typeof pendingAnimationPluginId !== 'undefined' && typeof newlyAddedPluginId !== 'undefined') {
              pendingAnimationPluginId = newlyAddedPluginId;
            }
            
            // Add the component to the appropriate location
            if (insertIndex !== null) {
              // Insertion point - use splice to insert at specific position
              if (isConditional && parentId) {
                // Find the parent component and add the plugin to its plugins
                const parentComponent = findComponentById(parentId);
                if (parentComponent) {
                  if (!parentComponent.config.plugins) {
                    parentComponent.config.plugins = [];
                  }
                  parentComponent.config.plugins.splice(insertIndex, 0, component);
                }
              } else {
                // Add to the main components array at specific index
                if (!components[insertType]) {
                  components[insertType] = [];
                }
                components[insertType].splice(insertIndex, 0, component);
              }
              
              // Clear the insertion point data
              delete modal.dataset.type;
              delete modal.dataset.index;
              delete modal.dataset.isConditional;
              delete modal.dataset.parentId;
              
              // Refresh the entire UI to rebuild insertion points
              loadExistingComponents();
            } else {
              // Regular "Add Input/Filter/Output" button - append to end
              if (!components[pluginType]) {
                components[pluginType] = [];
              }
              components[pluginType].push(component);

              // Refresh the entire UI to rebuild and trigger animation
              loadExistingComponents();
            }
            
            // Show the config modal for the new component
            if (typeof window.PluginConfigModal !== 'undefined') {
              // Use a small timeout to ensure the modal is properly initialized
              setTimeout(() => {
                window.PluginConfigModal.show(component, true); // Pass true to indicate it's a new component
              }, 50);
            }
            
            // Close the modal
            hide();
          }
        }
      }
    });

    // Close modal when clicking outside
    document.getElementById('pluginModal')?.addEventListener('click', (e) => {
      if (e.target === document.getElementById('pluginModal')) {
        hide();
      }
    });

    // Close with Escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        hide();
      }
    });
  }

  // Public API
  return {
    init,
    show,
    hide
  };
})();

// Make it globally available
window.PluginModal = PluginModal;

// Initialize with plugin data when the document is ready
function initializePluginModal() {
  if (typeof pluginData !== 'undefined') {
    PluginModal.init(pluginData);
  }
}

// Handle both immediate and delayed initialization
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initializePluginModal);
} else {
  // In case the script loads after DOMContentLoaded
  initializePluginModal();
}
</script>
