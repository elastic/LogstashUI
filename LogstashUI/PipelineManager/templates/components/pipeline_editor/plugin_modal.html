<!-- Plugin Selection Modal -->
<div id="pluginModal" class="hidden fixed inset-0 flex items-center justify-center z-50 p-4">
  <div class="absolute inset-0 bg-black/30 backdrop-blur-sm" onclick="PluginModal.hide()"></div>
  <div class="bg-gray-800 rounded-lg w-full max-w-4xl max-h-[90vh] flex flex-col relative z-10">
    <!-- Modal Header -->
    <div class="p-4 border-b border-gray-700 flex justify-between items-center">
      <h3 id="pluginModalTitle" class="text-lg font-semibold text-white">Select Plugin</h3>
      <button onclick="PluginModal.hide()" class="text-gray-400 hover:text-white">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Search Bar and Filters -->
    <div class="p-4 border-b border-gray-700 space-y-3">
      <input type="text"
             id="pluginSearch"
             placeholder="Search plugins..."
             class="w-full p-2 bg-gray-700 border border-gray-600 rounded text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
      <div class="flex items-center gap-2">
        <label for="bundledFilter" class="text-sm text-gray-300">Bundled:</label>
        <select id="bundledFilter"
                class="p-2 bg-gray-700 border border-gray-600 rounded text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="all">All</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
      </div>
    </div>

    <!-- Plugin Grid Container -->
    <div class="flex-1 overflow-y-auto">
      <div id="pluginGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 p-4">
        <!-- Plugin cards will be inserted here by JavaScript -->
      </div>
    </div>
  </div>
</div>

<script>
// Plugin Modal Controller
const PluginModal = (function() {
  let currentPluginType = '';
  let pluginData = {};

  // LocalStorage helper functions for user favorites
  const UserFavorites = {
    STORAGE_KEY: 'logstash_user_favorites',
    
    // Get all user favorites from localStorage
    getAll: function() {
      try {
        const stored = localStorage.getItem(this.STORAGE_KEY);
        return stored ? JSON.parse(stored) : {};
      } catch (e) {
        console.error('Error reading user favorites:', e);
        return {};
      }
    },
    
    // Check if a plugin is favorited by the user
    isFavorited: function(pluginName, pluginType) {
      const favorites = this.getAll();
      const key = `${pluginType}:${pluginName}`;
      return favorites[key] === true;
    },
    
    // Toggle favorite status for a plugin
    toggle: function(pluginName, pluginType) {
      const favorites = this.getAll();
      const key = `${pluginType}:${pluginName}`;
      
      if (favorites[key]) {
        delete favorites[key];
      } else {
        favorites[key] = true;
      }
      
      try {
        localStorage.setItem(this.STORAGE_KEY, JSON.stringify(favorites));
        return !favorites[key]; // Return new state (true if now favorited)
      } catch (e) {
        console.error('Error saving user favorites:', e);
        return false;
      }
    }
  };

  // Initialize the modal with plugin data
  function init(data) {
    pluginData = data;
    setupEventListeners();
  }

  // Show the modal for a specific plugin type
  function show(type) {
    currentPluginType = type;
    const modal = document.getElementById('pluginModal');
    const title = document.getElementById('pluginModalTitle');

    title.textContent = `Add ${type.charAt(0).toUpperCase() + type.slice(1)} Plugin`;
    renderPlugins(type);

    modal.classList.remove('hidden');
    document.getElementById('pluginSearch').focus();
  }

  // Hide the modal
  function hide() {
    document.getElementById('pluginModal').classList.add('hidden');
  }

  // Render plugins in the grid
  function renderPlugins(type) {
    const grid = document.getElementById('pluginGrid');
    const plugins = pluginData[type] || {};
    grid.innerHTML = '';

    // Sort plugins: user favorites first, then important, then alphabetically
    const pluginEntries = Object.entries(plugins);
    const favoritedPlugins = [];
    const importantPlugins = [];
    const regularPlugins = [];
    
    pluginEntries.forEach(([name, plugin]) => {
      if (UserFavorites.isFavorited(name, type)) {
        favoritedPlugins.push([name, plugin]);
      } else if (plugin.important === 'Yes') {
        importantPlugins.push([name, plugin]);
      } else {
        regularPlugins.push([name, plugin]);
      }
    });
    
    // Sort each group alphabetically by name
    favoritedPlugins.sort((a, b) => a[0].localeCompare(b[0]));
    regularPlugins.sort((a, b) => a[0].localeCompare(b[0]));
    
    // Combine: user favorites first, then important plugins, then regular plugins
    const sortedPlugins = [...favoritedPlugins, ...importantPlugins, ...regularPlugins];
    
    sortedPlugins.forEach(([name, plugin]) => {
      const card = createPluginCard(name, plugin, type);
      grid.appendChild(card);
    });

    // Re-attach search handler
    setupSearch();
  }

  // Create a plugin card element
  function createPluginCard(name, plugin, type) {
    const card = document.createElement('div');
    card.className = 'bg-gray-700 rounded-lg overflow-hidden hover:shadow-lg transition-shadow';
    card.dataset.bundled = (plugin.bundled || 'No').toLowerCase();

    card.innerHTML = `
      <div class="p-4 h-full flex flex-col">
        <div class="flex justify-between items-start mb-2">
          <div class="flex items-center gap-2">
            <img src="/static/images/${name.toLowerCase()}.png" 
                 alt="${name} icon" 
                 class="w-6 h-6 object-contain"
                 onerror="this.style.display='none'"
            >
            <h4 class="font-medium text-white">${name}</h4>
          </div>
          <div class="flex gap-1">
            ${plugin.bundled === 'Yes' ?
              '<span class="text-xs bg-green-600 text-white px-2 py-1 rounded flex items-center gap-1" title="Bundled with Logstash"><svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>Bundled</span>' :
              '<span class="text-xs bg-gray-600 text-gray-300 px-2 py-1 rounded" title="Not bundled with Logstash">External</span>'}
            ${plugin.deprecated ?
              '<span class="text-xs bg-red-500 text-white px-2 py-1 rounded">Deprecated</span>' : ''}
          </div>
        </div>
        ${plugin.description ?
          `<p class="text-sm text-gray-300 mb-3 flex-1">${plugin.description}</p>` : ''}
        <div class="mt-auto pt-3 border-t border-gray-600">
          <div class="flex justify-between items-center">
            <button data-plugin="${name}" data-type="${type}"
                    class="select-plugin-btn px-3 py-1 bg-blue-600 text-white text-sm rounded hover:bg-blue-700">
              Add
            </button>
            <div class="flex space-x-2">
              ${type === 'filter' && plugin.memory_intensive === 'Yes' ? 
                '<span class="text-gray-400 hover:text-white" title="This filter has the potential to use a lot of memory."><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z" /></svg></span>' : ''}
              ${createFavoriteIcon(name, type, plugin.important === 'Yes')}
              ${plugin.link ? createIconLink(plugin.link, 'Documentation', 'info', name, type) : ''}
              ${plugin.repo_link ? createIconLink(plugin.repo_link, 'Source Code', 'code', null, null) : ''}
            </div>
          </div>
        </div>
      </div>
    `;

    // Add click handler for the Add button
    const btn = card.querySelector('.select-plugin-btn');
    if (btn) {
      btn.addEventListener('click', () => {
        if (window.selectPlugin) {
          window.selectPlugin(name, type);
          hide();
        }
      });
    }

    return card;
  }

  // Create a favorite star icon (clickable)
  function createFavoriteIcon(pluginName, pluginType, isSystemImportant) {
    const isUserFavorited = UserFavorites.isFavorited(pluginName, pluginType);
    
    // Determine star appearance:
    // - Gold filled: User favorited
    // - Gray filled: System important (not user favorited)
    // - Outline: Neither
    let starColor, starFill, starTitle;
    
    if (isUserFavorited) {
      starColor = 'text-yellow-400';
      starFill = 'currentColor';
      starTitle = 'Favorited (click to unfavorite)';
    } else if (isSystemImportant) {
      starColor = 'text-gray-400';
      starFill = 'currentColor';
      starTitle = 'Popular plugin (click to favorite)';
    } else {
      starColor = 'text-gray-400';
      starFill = 'none';
      starTitle = 'Click to favorite';
    }
    
    return `
      <button class="favorite-star-btn ${starColor} hover:text-yellow-400 transition-colors cursor-pointer"
              data-plugin="${pluginName}"
              data-type="${pluginType}"
              title="${starTitle}"
              onclick="event.stopPropagation(); PluginModal.toggleFavorite('${pluginName}', '${pluginType}');">
        <svg class="w-5 h-5" fill="${starFill}" stroke="currentColor" stroke-width="${starFill === 'none' ? '2' : '0'}" viewBox="0 0 20 20">
          <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
        </svg>
      </button>
    `;
  }

  // Create an icon link
  function createIconLink(href, title, iconType, pluginName, pluginType) {
    const icons = {
      info: 'M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z',
      code: 'M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4'
    };

    // Only show iframe button for documentation links (iconType === 'info')
    const showIframeButton = iconType === 'info' && pluginName && pluginType;

    return `
      <div class="flex space-x-1">
        <a href="${href}" target="_blank"
           class="text-gray-400 hover:text-white"
           title="${title}">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="${icons[iconType] || icons.info}" />
          </svg>
        </a>
        ${showIframeButton ? createDocsIframeButton(pluginName, pluginType) : ''}
      </div>
    `;
  }

  // Create a docs iframe button
  function createDocsIframeButton(pluginName, pluginType) {
    return `
      <button onclick="event.stopPropagation(); DocsIframeModal.show('${pluginName}', '${pluginType}')"
              class="text-gray-400 hover:text-blue-400 transition-colors"
              title="View documentation in iframe">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
      </button>
    `;
  }

  // Setup search functionality
  function setupSearch() {
    const searchInput = document.getElementById('pluginSearch');
    const bundledFilter = document.getElementById('bundledFilter');
    if (!searchInput) return;

    searchInput.value = '';
    if (bundledFilter) bundledFilter.value = 'all';

    const filterPlugins = () => {
      const searchTerm = searchInput.value.toLowerCase();
      const bundledValue = bundledFilter ? bundledFilter.value : 'all';
      const cards = document.querySelectorAll('#pluginGrid > div');

      cards.forEach(card => {
        const name = card.querySelector('h4')?.textContent?.toLowerCase() || '';
        const description = card.querySelector('p')?.textContent?.toLowerCase() || '';
        const bundled = card.dataset.bundled || 'no';
        
        const matchesSearch = name.includes(searchTerm) || description.includes(searchTerm);
        const matchesBundled = bundledValue === 'all' || bundled === bundledValue;
        
        card.style.display = (matchesSearch && matchesBundled) ? '' : 'none';
      });
    };

    searchInput.oninput = filterPlugins;
    if (bundledFilter) {
      bundledFilter.onchange = filterPlugins;
    }
  }

  // Setup event listeners
  function setupEventListeners() {
    // Handle plugin selection
    document.addEventListener('click', (e) => {
      // Handle plugin selection
      const selectBtn = e.target.closest('.select-plugin-btn');
      if (selectBtn) {
        e.preventDefault();
        e.stopPropagation();
        
        const pluginName = selectBtn.dataset.plugin;
        const pluginType = selectBtn.dataset.type;
        
        if (pluginName && pluginType) {
          // Get the modal element
          const modal = document.getElementById('pluginModal');
          
          // Check if we're in a conditional context
          if (modal.dataset.context) {
            const context = JSON.parse(modal.dataset.context);
            
            // Check if this is a conditional insertion point (nested inside a conditional)
            if (context.conditionalInsertion) {
              // Handle insertion inside a conditional block at specific position
              const parentComponent = findComponentById(context.conditionalId);
              if (!parentComponent) return;
              
              const newPlugin = {
                id: `plugin-${Date.now()}`,
                type: context.type,
                plugin: pluginName,
                config: {}
              };
              
              // Track the newly added plugin for animation
              if (typeof newlyAddedPluginId !== 'undefined') {
                newlyAddedPluginId = newPlugin.id;
              }
              
              // Mark animation as pending until config modal closes (BEFORE loadExistingComponents)
              if (typeof pendingAnimationPluginId !== 'undefined' && typeof newlyAddedPluginId !== 'undefined') {
                pendingAnimationPluginId = newlyAddedPluginId;
              }
              
              // Determine which plugin array to insert into
              let targetPlugins;
              switch (context.blockType) {
                case 'if':
                  if (!parentComponent.config.plugins) parentComponent.config.plugins = [];
                  targetPlugins = parentComponent.config.plugins;
                  break;
                case 'else_if':
                  if (!parentComponent.config.else_ifs || !parentComponent.config.else_ifs[context.elseIfIndex]) return;
                  if (!parentComponent.config.else_ifs[context.elseIfIndex].plugins) {
                    parentComponent.config.else_ifs[context.elseIfIndex].plugins = [];
                  }
                  targetPlugins = parentComponent.config.else_ifs[context.elseIfIndex].plugins;
                  break;
                case 'else':
                  if (!parentComponent.config.else) parentComponent.config.else = { plugins: [] };
                  if (!parentComponent.config.else.plugins) parentComponent.config.else.plugins = [];
                  targetPlugins = parentComponent.config.else.plugins;
                  break;
                default:
                  return;
              }
              
              // Insert at the specified index
              targetPlugins.splice(context.index, 0, newPlugin);
              
              // Clean up context
              delete modal.dataset.context;
              
              // Hide modal and refresh UI
              hide();
              loadExistingComponents();
              
              // Show config modal
              if (typeof window.PluginConfigModal !== 'undefined') {
                setTimeout(() => {
                  window.PluginConfigModal.show(newPlugin, true); // Pass true to indicate it's a new component
                }, 50);
              }
              
              // Note: Pipeline warming will be triggered when config modal is saved
              // (handled in plugin_config_modal.js)
            } else {
              // This is a conditional block (for adding to if/else-if/else), dispatch an event with the plugin info
              const event = new CustomEvent('pluginSelected', {
                detail: {
                  pluginName,
                  pluginType
                }
              });
              
              // Store the context and clear it immediately to prevent issues
              const contextStr = modal.dataset.context;
              delete modal.dataset.context;
              
              // Close the modal first to avoid UI issues
              hide();
              
              // Dispatch the event with the stored context
              modal.dataset.context = contextStr;
              document.dispatchEvent(event);
              delete modal.dataset.context;
            }
          } else {
            // Regular plugin addition (non-conditional)
            // Check if we have insertion point data
            const insertIndex = modal.dataset.index ? parseInt(modal.dataset.index) : null;
            const insertType = modal.dataset.type || pluginType;
            const isConditional = modal.dataset.isConditional === 'true';
            const parentId = modal.dataset.parentId || null;
            
            const component = {
              id: `comp_${Date.now()}`,
              type: insertType,
              plugin: pluginName,
              config: {}
            };
            
            // Track the newly added plugin for animation
            if (typeof newlyAddedPluginId !== 'undefined') {
              newlyAddedPluginId = component.id;
            }
            
            // Mark animation as pending until config modal closes (BEFORE loadExistingComponents)
            if (typeof pendingAnimationPluginId !== 'undefined' && typeof newlyAddedPluginId !== 'undefined') {
              pendingAnimationPluginId = newlyAddedPluginId;
            }
            
            // Add the component to the appropriate location
            if (insertIndex !== null) {
              // Insertion point - use splice to insert at specific position
              if (isConditional && parentId) {
                // Find the parent component and add the plugin to its plugins
                const parentComponent = findComponentById(parentId);
                if (parentComponent) {
                  if (!parentComponent.config.plugins) {
                    parentComponent.config.plugins = [];
                  }
                  parentComponent.config.plugins.splice(insertIndex, 0, component);
                }
              } else {
                // Add to the main components array at specific index
                if (!components[insertType]) {
                  components[insertType] = [];
                }
                components[insertType].splice(insertIndex, 0, component);
              }
              
              // Clear the insertion point data
              delete modal.dataset.type;
              delete modal.dataset.index;
              delete modal.dataset.isConditional;
              delete modal.dataset.parentId;
              
              // Refresh the entire UI to rebuild insertion points
              loadExistingComponents();
            } else {
              // Regular "Add Input/Filter/Output" button - append to end
              if (!components[pluginType]) {
                components[pluginType] = [];
              }
              components[pluginType].push(component);

              // Refresh the entire UI to rebuild and trigger animation
              loadExistingComponents();
            }
            
            // Show the config modal for the new component
            if (typeof window.PluginConfigModal !== 'undefined') {
              // Use a small timeout to ensure the modal is properly initialized
              setTimeout(() => {
                window.PluginConfigModal.show(component, true); // Pass true to indicate it's a new component
              }, 50);
            }
            
            // Close the modal
            hide();
            
            // Note: Pipeline warming will be triggered when config modal is saved
            // (handled in plugin_config_modal.js)
          }
        }
      }
    });

    // Close modal when clicking outside
    document.getElementById('pluginModal')?.addEventListener('click', (e) => {
      if (e.target === document.getElementById('pluginModal')) {
        hide();
      }
    });

    // Close with Escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        hide();
      }
    });
  }

  // Toggle favorite status for a plugin
  function toggleFavorite(pluginName, pluginType) {
    UserFavorites.toggle(pluginName, pluginType);
    // Re-render to update star appearance and sort order
    renderPlugins(currentPluginType);
  }

  // Public API
  return {
    init,
    show,
    hide,
    toggleFavorite
  };
})();

// Make it globally available
window.PluginModal = PluginModal;

// Initialize with plugin data when the document is ready
function initializePluginModal() {
  if (typeof pluginData !== 'undefined') {
    PluginModal.init(pluginData);
  }
}

// Handle both immediate and delayed initialization
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initializePluginModal);
} else {
  // In case the script loads after DOMContentLoaded
  initializePluginModal();
}
</script>

<!-- Documentation Iframe Window -->
<div id="docsIframeWindow" class="hidden fixed z-[60] bg-gray-800 rounded-lg border border-gray-600 shadow-2xl flex flex-col" style="width: 700px; height: 600px; top: 50px; left: 50%; transform: translateX(-50%);">
  <div class="resize-handle resize-handle-n"></div>
  <div class="resize-handle resize-handle-e"></div>
  <div class="resize-handle resize-handle-s"></div>
  <div class="resize-handle resize-handle-w"></div>
  <div class="resize-handle resize-handle-ne"></div>
  <div class="resize-handle resize-handle-nw"></div>
  <div class="resize-handle resize-handle-se"></div>
  <div class="resize-handle resize-handle-sw"></div>
  
  <!-- Window Header (Draggable) -->
  <div id="docsWindowHeader" class="window-header p-3 border-b border-gray-700 flex justify-between items-center bg-gray-750 rounded-t-lg cursor-move select-none">
    <div class="flex items-center gap-3 flex-1">
      <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
      </svg>
      <h3 id="docsWindowTitle" class="text-base font-semibold text-white">Plugin Documentation</h3>
    </div>
    <div class="flex items-center gap-1">
      <a id="docsOpenNewTab" href="#" target="_blank" 
         class="px-2 py-1 text-xs bg-blue-600 hover:bg-blue-700 text-white rounded transition-colors flex items-center gap-1"
         title="Open in new tab">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
        </svg>
        <span>New Tab</span>
      </a>
      <button onclick="DocsIframeModal.minimize()" class="window-control-btn text-gray-400 hover:text-white hover:bg-gray-700 p-1.5 rounded transition-colors" title="Minimize">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4" />
        </svg>
      </button>
      <button onclick="DocsIframeModal.toggleMaximize()" class="window-control-btn text-gray-400 hover:text-white hover:bg-gray-700 p-1.5 rounded transition-colors" title="Maximize">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />
        </svg>
      </button>
      <button onclick="DocsIframeModal.hide()" class="window-control-btn text-gray-400 hover:text-red-400 hover:bg-gray-700 p-1.5 rounded transition-colors" title="Close">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  </div>
  
  <!-- Window Content -->
  <div class="flex-1 overflow-hidden relative bg-gray-900">
    <!-- Loading State -->
    <div id="docsLoadingState" class="absolute inset-0 flex items-center justify-center bg-gray-900">
      <div class="text-center">
        <svg class="w-12 h-12 animate-spin text-blue-400 mx-auto mb-3" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <p class="text-gray-300 text-sm">Loading documentation...</p>
      </div>
    </div>
    
    <!-- Error State -->
    <div id="docsErrorState" class="hidden absolute inset-0 flex items-center justify-center bg-gray-900 p-8">
      <div class="text-center max-w-md">
        <svg class="w-16 h-16 text-red-400 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <h4 class="text-lg font-semibold text-white mb-2">Failed to Load Documentation</h4>
        <p id="docsErrorMessage" class="text-gray-400 mb-4 text-sm"></p>
        <button onclick="DocsIframeModal.hide()" 
                class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded transition-colors text-sm">
          Close
        </button>
      </div>
    </div>
    
    <!-- Iframe -->
    <iframe id="docsIframe" 
            class="hidden w-full h-full border-0"
            sandbox="allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"
            referrerpolicy="no-referrer"
            loading="lazy">
    </iframe>
  </div>
  
  <!-- Footer with security notice -->
  <div class="px-3 py-1.5 border-t border-gray-700 bg-gray-750 text-xs text-gray-400 flex items-center gap-2 rounded-b-lg">
    <svg class="w-3 h-3 text-green-400" fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
    </svg>
    <span>Secure iframe - Content loaded from trusted documentation sources only</span>
  </div>
</div>

<style>
/* Draggable/Resizable Window Styles */
.window-header {
  user-select: none;
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
}

.window-control-btn {
  flex-shrink: 0;
}

/* Resize Handles */
.resize-handle {
  position: absolute;
  z-index: 10;
}

.resize-handle-n {
  top: 0;
  left: 0;
  right: 0;
  height: 5px;
  cursor: ns-resize;
}

.resize-handle-s {
  bottom: 0;
  left: 0;
  right: 0;
  height: 5px;
  cursor: ns-resize;
}

.resize-handle-e {
  top: 0;
  right: 0;
  bottom: 0;
  width: 5px;
  cursor: ew-resize;
}

.resize-handle-w {
  top: 0;
  left: 0;
  bottom: 0;
  width: 5px;
  cursor: ew-resize;
}

.resize-handle-ne {
  top: 0;
  right: 0;
  width: 10px;
  height: 10px;
  cursor: nesw-resize;
}

.resize-handle-nw {
  top: 0;
  left: 0;
  width: 10px;
  height: 10px;
  cursor: nwse-resize;
}

.resize-handle-se {
  bottom: 0;
  right: 0;
  width: 10px;
  height: 10px;
  cursor: nwse-resize;
}

.resize-handle-sw {
  bottom: 0;
  left: 0;
  width: 10px;
  height: 10px;
  cursor: nesw-resize;
}

/* Window animations */
#docsIframeWindow {
  transition: opacity 0.2s ease;
}

#docsIframeWindow.minimized {
  opacity: 0;
  pointer-events: none;
  transform: translateX(-50%) scale(0.9) !important;
}
</style>

<script>
// Documentation Iframe Window Controller
const DocsIframeModal = (function() {
  let currentUrl = null;
  let isDragging = false;
  let isResizing = false;
  let resizeDirection = null;
  let startX, startY, startWidth, startHeight, startLeft, startTop;
  let isMaximized = false;
  let isMinimized = false;
  let savedPosition = { width: 700, height: 600, top: 50, left: '50%', transform: 'translateX(-50%)' };
  
  function show(pluginName, pluginType) {
    const window = document.getElementById('docsIframeWindow');
    const title = document.getElementById('docsWindowTitle');
    const iframe = document.getElementById('docsIframe');
    const loadingState = document.getElementById('docsLoadingState');
    const errorState = document.getElementById('docsErrorState');
    const errorMessage = document.getElementById('docsErrorMessage');
    const openNewTabBtn = document.getElementById('docsOpenNewTab');
    
    // Reset states
    loadingState.classList.remove('hidden');
    errorState.classList.add('hidden');
    iframe.classList.add('hidden');
    iframe.src = '';
    currentUrl = null;
    
    // Update title
    title.textContent = `${pluginName} Documentation`;
    
    // Show window
    window.classList.remove('hidden', 'minimized');
    isMinimized = false;
    
    // Fetch the validated documentation URL from backend
    fetch(`/ConnectionManager/GetPluginDocumentation/?type=${encodeURIComponent(pluginType)}&name=${encodeURIComponent(pluginName)}`)
      .then(response => {
        if (!response.ok) {
          return response.json().then(data => {
            throw new Error(data.error || 'Failed to load documentation');
          });
        }
        return response.json();
      })
      .then(data => {
        currentUrl = data.url;
        
        // Set iframe src
        iframe.src = currentUrl;
        
        // Update "Open in New Tab" link
        openNewTabBtn.href = currentUrl;
        
        // Hide loading, show iframe
        loadingState.classList.add('hidden');
        iframe.classList.remove('hidden');
        
        // Handle iframe load errors
        iframe.onerror = () => {
          showError('The documentation page failed to load. Please try opening it in a new tab.');
        };
        
        // Timeout fallback
        setTimeout(() => {
          if (loadingState.classList.contains('hidden') === false) {
            loadingState.classList.add('hidden');
            iframe.classList.remove('hidden');
          }
        }, 10000);
      })
      .catch(error => {
        showError(error.message);
      });
  }
  
  function showError(message) {
    const loadingState = document.getElementById('docsLoadingState');
    const errorState = document.getElementById('docsErrorState');
    const errorMessage = document.getElementById('docsErrorMessage');
    const iframe = document.getElementById('docsIframe');
    
    loadingState.classList.add('hidden');
    iframe.classList.add('hidden');
    errorState.classList.remove('hidden');
    errorMessage.textContent = message;
  }
  
  function hide() {
    const window = document.getElementById('docsIframeWindow');
    const iframe = document.getElementById('docsIframe');
    
    window.classList.add('hidden');
    
    // Clear iframe src to stop loading
    iframe.src = '';
    currentUrl = null;
  }
  
  function minimize() {
    const window = document.getElementById('docsIframeWindow');
    isMinimized = !isMinimized;
    
    if (isMinimized) {
      window.classList.add('minimized');
    } else {
      window.classList.remove('minimized');
    }
  }
  
  function toggleMaximize() {
    const window = document.getElementById('docsIframeWindow');
    
    if (!isMaximized) {
      // Save current position
      savedPosition = {
        width: window.offsetWidth,
        height: window.offsetHeight,
        top: window.style.top,
        left: window.style.left,
        transform: window.style.transform
      };
      
      // Maximize
      window.style.width = '100vw';
      window.style.height = '100vh';
      window.style.top = '0';
      window.style.left = '0';
      window.style.transform = 'none';
      isMaximized = true;
    } else {
      // Restore
      window.style.width = savedPosition.width + 'px';
      window.style.height = savedPosition.height + 'px';
      window.style.top = savedPosition.top;
      window.style.left = savedPosition.left;
      window.style.transform = savedPosition.transform;
      isMaximized = false;
    }
  }
  
  // Initialize drag and resize functionality
  function init() {
    const window = document.getElementById('docsIframeWindow');
    const header = document.getElementById('docsWindowHeader');
    const resizeHandles = window.querySelectorAll('.resize-handle');
    
    // Dragging
    header.addEventListener('mousedown', (e) => {
      if (e.target.closest('.window-control-btn') || e.target.closest('a')) return;
      if (isMaximized) return;
      
      isDragging = true;
      startX = e.clientX - window.offsetLeft;
      startY = e.clientY - window.offsetTop;
      
      // Remove transform for easier calculation
      if (window.style.transform) {
        const rect = window.getBoundingClientRect();
        window.style.left = rect.left + 'px';
        window.style.transform = 'none';
      }
      
      e.preventDefault();
    });
    
    // Resizing
    resizeHandles.forEach(handle => {
      handle.addEventListener('mousedown', (e) => {
        if (isMaximized) return;
        
        isResizing = true;
        resizeDirection = handle.className.split(' ').find(c => c.startsWith('resize-handle-')).replace('resize-handle-', '');
        
        startX = e.clientX;
        startY = e.clientY;
        startWidth = window.offsetWidth;
        startHeight = window.offsetHeight;
        
        const rect = window.getBoundingClientRect();
        startLeft = rect.left;
        startTop = rect.top;
        
        // Remove transform for easier calculation
        if (window.style.transform) {
          window.style.left = startLeft + 'px';
          window.style.top = startTop + 'px';
          window.style.transform = 'none';
        }
        
        e.preventDefault();
        e.stopPropagation();
      });
    });
    
    // Mouse move
    document.addEventListener('mousemove', (e) => {
      if (isDragging) {
        const newLeft = e.clientX - startX;
        const newTop = e.clientY - startY;
        
        window.style.left = newLeft + 'px';
        window.style.top = newTop + 'px';
      } else if (isResizing) {
        const deltaX = e.clientX - startX;
        const deltaY = e.clientY - startY;
        
        let newWidth = startWidth;
        let newHeight = startHeight;
        let newLeft = startLeft;
        let newTop = startTop;
        
        // Handle different resize directions
        if (resizeDirection.includes('e')) {
          newWidth = Math.max(300, startWidth + deltaX);
        }
        if (resizeDirection.includes('w')) {
          newWidth = Math.max(300, startWidth - deltaX);
          newLeft = startLeft + deltaX;
        }
        if (resizeDirection.includes('s')) {
          newHeight = Math.max(300, startHeight + deltaY);
        }
        if (resizeDirection.includes('n')) {
          newHeight = Math.max(300, startHeight - deltaY);
          newTop = startTop + deltaY;
        }
        
        window.style.width = newWidth + 'px';
        window.style.height = newHeight + 'px';
        
        if (resizeDirection.includes('w') || resizeDirection.includes('n')) {
          window.style.left = newLeft + 'px';
          window.style.top = newTop + 'px';
        }
      }
    });
    
    // Mouse up
    document.addEventListener('mouseup', () => {
      isDragging = false;
      isResizing = false;
      resizeDirection = null;
    });
  }
  
  return {
    show,
    hide,
    minimize,
    toggleMaximize,
    init
  };
})();

// Make globally available
window.DocsIframeModal = DocsIframeModal;

// Initialize when DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => DocsIframeModal.init());
} else {
  DocsIframeModal.init();
}
</script>
