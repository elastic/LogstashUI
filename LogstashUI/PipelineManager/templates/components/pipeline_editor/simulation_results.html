

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="space-y-4" data-run-id="{{ run_id }}">
    <div class="p-4 bg-green-900/30 border border-green-600 rounded-lg">
        <h3 class="text-lg font-semibold text-green-400 mb-2">✓ Simulation Started</h3>
        <pre class="text-xs text-green-200 font-mono">Slot {{ slot_id }}: Single pipeline with {{ filter_count }} instrumented filters {% if reused %}(reused){% else %}(new){% endif %}
Run ID: {{ run_id }}</pre>
    </div>
    
    <div id="simulation-results" class="p-4 bg-gray-800 rounded-lg">
        <h4 class="text-sm font-semibold text-gray-300 mb-2">Results:</h4>
        <div id="results-container" class="bg-gray-900 rounded">
            <svg id="pipeline-graph" width="100%" height="600" class="bg-gray-900"></svg>
        </div>
    </div>
</div>

<script>
    // Get run_id from the data attribute
    const runId = document.querySelector('[data-run-id]').getAttribute('data-run-id');
    // Initialize the simulation results polling with run_id
    initSimulationResults(runId);
</script>
