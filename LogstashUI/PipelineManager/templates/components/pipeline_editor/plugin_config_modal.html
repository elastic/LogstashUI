{% load static %}
<script src="{% static 'js/plugin_config_modal.js' %}"></script>

<!-- Plugin Configuration Modal -->
<div id="configModal" class="hidden fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50 p-4">
    <div class="bg-gray-800 rounded-lg w-full max-w-2xl max-h-[90vh] flex flex-col">
        <!-- Modal Header -->
        <div class="p-4 border-b border-gray-700 flex justify-between items-center">
            <h3 class="text-lg font-semibold text-white"></h3>
            <button onclick="PluginConfigModal.hide()" class="text-gray-400 hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <!-- Configuration Form -->
        <div class="p-4 overflow-y-auto flex-1">
            <form id="configForm" class="space-y-4">
                <!-- Dynamic content will be inserted here -->
            </form>
        </div>
    </div>
</div>
</body>
</html>
