{% extends "base.html" %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/codemirror.min.css' %}">

<style>
  /* CodeMirror container styling - matching pipeline_text_editor */
  .CodeMirror {
    height: 100%;
    font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
    font-size: 14px;
    background: #1f2937;
    color: #e5e7eb;
    border: none !important;
  }
  
  .CodeMirror-gutters {
    background: #374151;
    border-right: 1px solid #4b5563;
  }
  
  .CodeMirror-linenumber {
    color: #9ca3af;
  }
  
  .CodeMirror-cursor {
    border-left: 1px solid #e5e7eb;
  }
  
  /* Selection highlight */
  .CodeMirror-selected {
    background: #3b82f6 !important;
  }
  
  .CodeMirror-focused .CodeMirror-selected {
    background: #3b82f6 !important;
  }
  
  /* Bracket matching */
  .CodeMirror-matchingbracket {
    color: #22c55e !important;
    background-color: rgba(34, 197, 94, 0.2);
    font-weight: bold;
  }
  
  .CodeMirror-nonmatchingbracket {
    color: #ef4444 !important;
    background-color: rgba(239, 68, 68, 0.2);
    font-weight: bold;
  }
  
  /* Scrollbar styling */
  .CodeMirror-vscrollbar::-webkit-scrollbar,
  .CodeMirror-hscrollbar::-webkit-scrollbar {
    width: 12px;
    height: 12px;
  }
  
  .CodeMirror-vscrollbar::-webkit-scrollbar-track,
  .CodeMirror-hscrollbar::-webkit-scrollbar-track {
    background: rgba(15, 23, 42, 0.3);
    border-radius: 6px;
  }
  
  .CodeMirror-vscrollbar::-webkit-scrollbar-thumb,
  .CodeMirror-hscrollbar::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, #475569 0%, #334155 100%);
    border-radius: 6px;
    border: 2px solid rgba(30, 41, 59, 0.5);
  }
  
  .CodeMirror-vscrollbar::-webkit-scrollbar-thumb:hover,
  .CodeMirror-hscrollbar::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(180deg, #64748b 0%, #475569 100%);
  }
  
  .file-tab {
    padding: 0.5rem 1rem;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  
  .file-tab:hover {
    background-color: #374151;
  }
  
  .file-tab.active {
    border-bottom-color: #3b82f6;
    background-color: #1f2937;
  }
  
  .mode-toggle {
    display: inline-flex;
    border-radius: 0.375rem;
    overflow: hidden;
  }
  
  .mode-toggle button {
    padding: 0.25rem 0.75rem;
    background-color: #374151;
    color: #9ca3af;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .mode-toggle button:hover {
    background-color: #4b5563;
  }
  
  .mode-toggle button.active {
    background-color: #3b82f6;
    color: white;
  }
  
  /* YAML Syntax Highlighting - Brighter Colors */
  .cm-atom { color: #60a5fa !important; } /* Keys - bright blue */
  .cm-string { color: #86efac !important; } /* Strings - bright green */
  .cm-number { color: #fbbf24 !important; } /* Numbers - bright yellow */
  .cm-keyword { color: #c084fc !important; } /* Keywords - bright purple */
  .cm-comment { color: #6b7280 !important; } /* Comments - gray (matching image) */
  .cm-meta { color: #fb923c !important; } /* Meta - bright orange */
  .cm-variable-2 { color: #f472b6 !important; } /* Variables - bright pink */
  .cm-def { color: #34d399 !important; } /* Definitions - bright teal */
</style>

<div class="p-6">
  <!-- Header with Policy Selector and Actions -->
  <div class="bg-gray-800/95 rounded-lg shadow-xl p-4 mb-4">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-4">
        <span class="text-white font-medium">Policy:</span>
        <div class="flex items-center gap-2">
          <select id="policySelect" class="select select-bordered select-sm bg-gray-700 text-white border-gray-600">
            <option value="default">Default Policy</option>
            <option value="add_new" class="font-bold text-primary">+ Add Policy</option>
          </select>
          <span id="defaultPolicyIndicator" class="text-xs text-gray-400 italic flex items-center gap-1 whitespace-nowrap">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
            Read-only
          </span>
          <button id="deletePolicyBtn" class="hidden btn btn-sm btn-ghost text-red-400 hover:text-red-300 hover:bg-red-900/20" onclick="deleteCurrentPolicy()">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
          </button>
        </div>
      </div>
      <div class="flex gap-2">
        <button id="saveBtn" class="btn btn-sm btn-primary">
          <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
          </svg>
          Save
        </button>
        <button id="deployBtn" class="btn btn-sm bg-green-600 hover:bg-green-700 text-white">
          <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
          </svg>
          Deploy
        </button>
      </div>
    </div>
  </div>

  <!-- Global Config Section -->
  <div class="bg-gray-800/95 rounded-lg shadow-xl p-4 mb-4">
    <div class="flex items-center mb-2">
      <button id="globalConfigToggle" class="flex items-center gap-2 text-white font-medium hover:text-blue-400 transition-colors">
        <svg class="w-5 h-5 transform transition-transform" id="globalConfigChevron" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
        Global Config
      </button>
    </div>
    <div id="globalConfigContent" class="mt-3 space-y-3">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1">Settings Path:</label>
          <input type="text" id="settingsPath" value="/etc/logstash/" class="input input-bordered input-sm w-full bg-gray-700 text-white border-gray-600">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1">Logs Path:</label>
          <input type="text" id="logsPath" value="/var/log/logstash" class="input input-bordered input-sm w-full bg-gray-700 text-white border-gray-600">
        </div>
      </div>
    </div>
  </div>

  <!-- File Tabs and Editor -->
  <div class="bg-gray-800/95 rounded-lg shadow-xl overflow-hidden">
    <!-- File Tabs -->
    <div class="flex items-center justify-between bg-gray-900 border-b border-gray-700">
      <div class="flex">
        <div class="file-tab active" data-file="logstash.yml">
          <span class="text-white text-sm">logstash.yml</span>
        </div>
        <div class="file-tab" data-file="jvm.options">
          <span class="text-gray-400 text-sm">jvm.options</span>
        </div>
        <div class="file-tab" data-file="log4j2.properties">
          <span class="text-gray-400 text-sm">log4j2.properties</span>
        </div>
      </div>
      
      <!-- Mode Toggle (only visible for logstash.yml) -->
      <div id="modeToggleContainer" class="pr-4">
        <span class="text-gray-400 text-sm mr-2">Mode:</span>
        <div class="mode-toggle">
          <button id="formModeBtn" class="active">Form</button>
          <button id="codeModeBtn">Code</button>
        </div>
      </div>
    </div>

    <!-- Editor Area -->
    <div class="p-4" style="height: calc(100vh - 400px); min-height: 400px;">
      <!-- Form Mode (placeholder for future implementation) -->
      <div id="formModeEditor" class="h-full">
        <div class="flex items-center justify-center h-full">
          <div class="text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600/20 rounded-full mb-4">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
              </svg>
            </div>
            <h3 class="text-xl font-semibold text-white mb-2">Form Mode</h3>
            <p class="text-gray-400">Form-based editor coming soon...</p>
          </div>
        </div>
      </div>
      
      <!-- Code Mode -->
      <div id="codeModeEditor" class="h-full hidden">
        <textarea id="codeEditor"></textarea>
      </div>
    </div>
  </div>
</div>

<!-- Include popup modal -->
{% include 'popup.html' %}

<script src="{% static 'js/codemirror.min.js' %}"></script>
<script src="{% static 'js/yaml.js' %}"></script>
<script src="{% static 'js/simple-comment-mode.js' %}"></script>
<script src="{% static 'js/agent_policies.js' %}"></script>
{% endblock %}
