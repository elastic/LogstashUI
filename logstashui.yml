simulation:
  # embedded - Runs in a local container (slower)
  # host  - Runs on the host machine (much faster, requires Logstash to be installed and not running) https://www.elastic.co/docs/reference/logstash/installing-logstash
  mode: embedded # embedded | host

  host:
    # Path to the Logstash binary on the simulation node
    logstash_binary: /usr/share/logstash/bin/logstash
