name: Build & Push Docker Image

on:
  push:
    tags:
      - "v*"

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Decide what tags to publish based on whether this is main or a release tag
      - name: Compute image tags
        id: vars
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/logstashui"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tags=$IMAGE:$VERSION,$IMAGE:latest" >> $GITHUB_OUTPUT
            echo "app_version=$VERSION" >> $GITHUB_OUTPUT
          else
            SHORT_SHA="$(echo $GITHUB_SHA | cut -c1-7)"
            echo "version=edge" >> $GITHUB_OUTPUT
            echo "tags=$IMAGE:edge,$IMAGE:sha-$SHORT_SHA" >> $GITHUB_OUTPUT
            echo "app_version=edge" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.vars.outputs.tags }}
