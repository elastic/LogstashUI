services:
  logstashui:
    #image: codyjackson032/logstashui:latest
    # Uncomment below to build locally instead of pulling from Docker Hub
    build:
      context: ./LogstashUI
      dockerfile: Dockerfile
    expose:
      - "8080"
    volumes:
      - logstashui_data:/app/LogstashUI/data
    environment:
      - DEBUG=False
      # SECRET_KEY: Optional - will auto-generate and persist in data/.django_secret_key if not set
      # - SECRET_KEY=${SECRET_KEY}
      # ALLOWED_HOSTS: Set to your domain(s) in production (comma-separated)
      # Example: ALLOWED_HOSTS=yourdomain.com,www.yourdomain.com,192.168.1.100
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-}
      # LOGSTASH_AGENT_URL: Automatically set in settings.py based on DEBUG mode
      # DEBUG=True: http://logstashagent:9500 (direct)
      # DEBUG=False: https://nginx:9500 (via nginx proxy with self-signed cert)
    restart: unless-stopped
    networks:
      - logstashui_network

  logstashagent:
    #image: codyjackson032/logstashagent:latest
    # Uncomment below to build locally instead of pulling from Docker Hub
    build:
      context: ./LogstashAgent
      dockerfile: Dockerfile
    ports:
      - "9600:9600"  # Logstash API
      - "9449:9449"  # Logstash HTTP input (for sample events)
    expose:
      - "9500"  # FastAPI sidecar API (internal only, accessed via nginx)
    environment:
      - LOGSTASH_URL=https://host.docker.internal  # HTTPS via nginx (no port needed - uses 443)
      - SIMULATION_MODE=true  # Enable file upload for simulation
    restart: unless-stopped
    networks:
      - logstashui_network

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
      - "80:80"
      - "9500:9500"  # LogstashAgent API proxy (HTTP in debug, HTTPS in production)
    volumes:
      - ./LogstashUI/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs
    depends_on:
      - logstashui
    restart: unless-stopped
    networks:
      - logstashui_network
    entrypoint: /bin/sh -c "
      if [ ! -f /etc/nginx/certs/cert.pem ]; then
        apk add --no-cache openssl &&
        openssl req -x509 -nodes -days 365 -newkey rsa:2048
          -keyout /etc/nginx/certs/key.pem
          -out /etc/nginx/certs/cert.pem
          -subj '/CN=localhost';
      fi &&
      nginx -g 'daemon off;'"

volumes:
  logstashui_data:
  nginx_certs:

networks:
  logstashui_network:
