<li>
    {% if item.children %}
        <!-- Folder with children - collapsible -->
        <details open>
            <summary>
                <a href="{{ item.url }}" class="{% if request.path == item.url %}active{% endif %}">
                    {{ item.title }}
                </a>
            </summary>
            <ul>
                {% for child in item.children %}
                    {% include 'nav_item.html' with item=child %}
                {% endfor %}
            </ul>
        </details>
    {% else %}
        <!-- Leaf item - no children -->
        <a href="{{ item.url }}" class="{% if request.path == item.url %}active{% endif %}">
            {{ item.title }}
        </a>
    {% endif %}
</li>
