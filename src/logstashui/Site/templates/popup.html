<!-- Confirmation Modal -->
<div id="confirmationModal" class="hidden fixed inset-0 flex items-center justify-center z-[10001] p-4">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="ConfirmationModal.cancel()"></div>
    <div class="bg-gray-800 rounded-lg w-full max-w-md relative z-10 border border-gray-700 shadow-2xl">
        <!-- Modal Header -->
        <div class="p-4 border-b border-gray-700 flex justify-between items-center">
            <h3 id="confirmationModalTitle" class="text-lg font-semibold text-white">Confirm Action</h3>
            <button onclick="ConfirmationModal.cancel()" class="text-gray-400 hover:text-white transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Modal Body -->
        <div class="p-6">
            <p id="confirmationModalMessage" class="text-gray-300 whitespace-pre-line"></p>
            <div id="confirmationModalInputWrapper" class="hidden mt-4 relative">
                <input type="text" id="confirmationModalInput" class="w-full px-3 py-2 pr-10 bg-gray-900 border border-gray-600 rounded-md text-white focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent" placeholder="">
                <button type="button" id="confirmationModalTogglePassword" class="hidden absolute inset-y-0 right-0 px-3 flex items-center text-gray-400 hover:text-gray-200" tabindex="-1" onclick="ConfirmationModal._togglePasswordVisibility()">
                    <svg id="confirmationModalEyeIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                </button>
            </div>
            <pre id="confirmationModalCode" class="hidden mt-4 p-4 bg-gray-900 rounded-lg text-xs font-mono text-red-400 whitespace-pre-wrap overflow-x-auto border border-gray-700"></pre>
        </div>

        <!-- Modal Footer -->
        <div class="p-4 border-t border-gray-700 flex justify-end space-x-3">
            <button type="button" id="confirmationModalCancelBtn" onclick="ConfirmationModal.cancel()"
                    class="px-5 py-2 text-sm font-medium text-gray-300 bg-gray-700 rounded-md hover:bg-gray-600 transition-colors">
                Cancel
            </button>
            <button type="button" onclick="ConfirmationModal.confirm()"
                    id="confirmationModalOkBtn"
                    class="px-5 py-2 text-sm font-medium text-white bg-purple-600 rounded-md hover:bg-purple-700 transition-colors">
                OK
            </button>
        </div>
    </div>
</div>

<script>
/**
 * Custom Confirmation Modal
 * Replaces browser's confirm() with a styled modal that matches the app theme
 */
window.ConfirmationModal = {
    // Callback functions
    onConfirm: null,
    onCancel: null,
    
    /**
     * Show the confirmation modal
     * @param {string} message - The message to display
     * @param {string} title - Optional title (defaults to "Confirm Action")
     * @param {string} okText - Optional text for OK button (defaults to "OK")
     * @param {string} codeMessage - Optional code/error message to display in a code block
     * @param {boolean} isAlert - If true, hides Cancel button (for alerts vs confirmations)
     * @returns {Promise} - Resolves with true if confirmed, false if cancelled
     */
    show: function(message, title = 'Confirm Action', okText = 'OK', codeMessage = null, isAlert = false, cancelText = 'Cancel') {
        return new Promise((resolve, reject) => {
            const modal = document.getElementById('confirmationModal');
            const titleEl = document.getElementById('confirmationModalTitle');
            const messageEl = document.getElementById('confirmationModalMessage');
            const inputEl = document.getElementById('confirmationModalInput');
            const codeEl = document.getElementById('confirmationModalCode');
            const okBtn = document.getElementById('confirmationModalOkBtn');
            const cancelBtn = document.getElementById('confirmationModalCancelBtn');

            // Set content
            titleEl.textContent = title;
            messageEl.textContent = message;
            okBtn.textContent = okText;
            cancelBtn.textContent = cancelText;

            // Hide input wrapper for regular confirmations
            document.getElementById('confirmationModalInputWrapper').classList.add('hidden');

            // Handle code message
            if (codeMessage) {
                codeEl.textContent = codeMessage;
                codeEl.classList.remove('hidden');
            } else {
                codeEl.classList.add('hidden');
            }

            // Show/hide Cancel button based on isAlert
            if (isAlert) {
                cancelBtn.classList.add('hidden');
            } else {
                cancelBtn.classList.remove('hidden');
            }
            
            // Set callbacks
            this.onConfirm = () => {
                this.hide();
                resolve(true);
            };
            
            this.onCancel = () => {
                this.hide();
                resolve(false);
            };
            
            // Show modal
            modal.classList.remove('hidden');
            
            // Focus OK button
            setTimeout(() => okBtn.focus(), 100);
        });
    },
    
    /**
     * Show a prompt modal for text input
     * @param {string} message - The message to display
     * @param {string} defaultValue - Default value for the input field
     * @param {string} title - Optional title (defaults to "Input Required")
     * @param {string} placeholder - Optional placeholder text for input
     * @returns {Promise} - Resolves with the input value if confirmed, null if cancelled
     */
    prompt: function(message, defaultValue = '', title = 'Input Required', placeholder = '', isPassword = false) {
        return new Promise((resolve, reject) => {
            const modal = document.getElementById('confirmationModal');
            const titleEl = document.getElementById('confirmationModalTitle');
            const messageEl = document.getElementById('confirmationModalMessage');
            const inputWrapper = document.getElementById('confirmationModalInputWrapper');
            const inputEl = document.getElementById('confirmationModalInput');
            const toggleBtn = document.getElementById('confirmationModalTogglePassword');
            const codeEl = document.getElementById('confirmationModalCode');
            const okBtn = document.getElementById('confirmationModalOkBtn');
            const cancelBtn = document.getElementById('confirmationModalCancelBtn');

            // Set content
            titleEl.textContent = title;
            messageEl.textContent = message;
            okBtn.textContent = 'OK';
            cancelBtn.textContent = 'Cancel';

            // Show and configure input field
            inputWrapper.classList.remove('hidden');
            inputEl.value = defaultValue;
            inputEl.placeholder = placeholder;
            inputEl.type = isPassword ? 'password' : 'text';
            if (isPassword) {
                toggleBtn.classList.remove('hidden');
            } else {
                toggleBtn.classList.add('hidden');
            }

            // Hide code block
            codeEl.classList.add('hidden');

            // Show Cancel button
            cancelBtn.classList.remove('hidden');

            // Set callbacks
            this.onConfirm = () => {
                const value = inputEl.value.trim();
                this.hide();
                resolve(value || null);
            };

            this.onCancel = () => {
                this.hide();
                resolve(null);
            };

            // Show modal
            modal.classList.remove('hidden');

            // Focus input field
            setTimeout(() => inputEl.focus(), 100);
        });
    },
    
    /**
     * Hide the modal
     */
    hide: function() {
        const modal = document.getElementById('confirmationModal');
        modal.classList.add('hidden');
        // Reset input state
        const inputEl = document.getElementById('confirmationModalInput');
        const inputWrapper = document.getElementById('confirmationModalInputWrapper');
        const toggleBtn = document.getElementById('confirmationModalTogglePassword');
        inputEl.type = 'text';
        inputWrapper.classList.add('hidden');
        toggleBtn.classList.add('hidden');
        this.onConfirm = null;
        this.onCancel = null;
    },

    _togglePasswordVisibility: function() {
        const inputEl = document.getElementById('confirmationModalInput');
        const eyeIcon = document.getElementById('confirmationModalEyeIcon');
        const isHidden = inputEl.type === 'password';
        inputEl.type = isHidden ? 'text' : 'password';
        eyeIcon.innerHTML = isHidden
            ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />'
            : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />';
    },
    
    /**
     * Handle confirm button click
     */
    confirm: function() {
        if (this.onConfirm) {
            this.onConfirm();
        }
    },
    
    /**
     * Handle cancel button click
     */
    cancel: function() {
        if (this.onCancel) {
            this.onCancel();
        }
    }
};

// Handle ESC key to close modal
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        const modal = document.getElementById('confirmationModal');
        if (modal && !modal.classList.contains('hidden')) {
            ConfirmationModal.cancel();
        }
    }
});

// Handle Enter key to confirm
document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        const modal = document.getElementById('confirmationModal');
        if (modal && !modal.classList.contains('hidden')) {
            ConfirmationModal.confirm();
        }
    }
});
</script>
