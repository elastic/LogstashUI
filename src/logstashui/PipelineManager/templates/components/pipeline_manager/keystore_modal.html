<!-- Keystore Entry Modal -->
<div id="keystoreModal" class="hidden fixed inset-0 flex items-center justify-center z-[10001] p-4">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="KeystoreModal.cancel()"></div>
    <div class="bg-gray-800 rounded-lg w-full max-w-md relative z-10 border border-gray-700 shadow-2xl">
        <!-- Modal Header -->
        <div class="p-4 border-b border-gray-700 flex justify-between items-center">
            <h3 id="keystoreModalTitle" class="text-lg font-semibold text-white">Create Keystore Entry</h3>
            <button onclick="KeystoreModal.cancel()" class="text-gray-400 hover:text-white transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Modal Body -->
        <div class="p-6 space-y-4">
            <!-- Key Name Input -->
            <div>
                <label for="keystoreKeyName" class="block text-sm font-medium text-gray-300 mb-2">Key Name</label>
                <input type="text" id="keystoreKeyName" 
                       class="w-full px-3 py-2 bg-gray-900 border border-gray-600 rounded-md text-white focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent" 
                       placeholder="e.g., ES_API_KEY">
            </div>

            <!-- Key Value Input with Password Toggle -->
            <div>
                <label for="keystoreKeyValue" class="block text-sm font-medium text-gray-300 mb-2">Key Value</label>
                <div class="relative">
                    <input type="password" id="keystoreKeyValue" 
                           class="w-full px-3 py-2 pr-10 bg-gray-900 border border-gray-600 rounded-md text-white focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent" 
                           placeholder="Enter secret value">
                    <button type="button" 
                            class="absolute right-2 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-200"
                            onclick="KeystoreModal.togglePasswordVisibility()"
                            title="Show/Hide">
                        <svg id="keystoreEyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Modal Footer -->
        <div class="p-4 border-t border-gray-700 flex justify-end space-x-3">
            <button type="button" onclick="KeystoreModal.cancel()"
                    class="px-5 py-2 text-sm font-medium text-gray-300 bg-gray-700 rounded-md hover:bg-gray-600 transition-colors">
                Cancel
            </button>
            <button type="button" onclick="KeystoreModal.confirm()"
                    id="keystoreModalOkBtn"
                    class="px-5 py-2 text-sm font-medium text-white bg-purple-600 rounded-md hover:bg-purple-700 transition-colors">
                Create
            </button>
        </div>
    </div>
</div>

<script>
/**
 * Keystore Entry Modal
 * Modal for creating and editing keystore entries
 */
window.KeystoreModal = {
    // Callback functions
    onConfirm: null,
    onCancel: null,
    currentEntryId: null,
    
    /**
     * Show the modal for creating a new keystore entry
     * @returns {Promise} - Resolves with {keyName, keyValue} if confirmed, null if cancelled
     */
    showCreate: function() {
        return new Promise((resolve, reject) => {
            const modal = document.getElementById('keystoreModal');
            const titleEl = document.getElementById('keystoreModalTitle');
            const keyNameInput = document.getElementById('keystoreKeyName');
            const keyValueInput = document.getElementById('keystoreKeyValue');
            const okBtn = document.getElementById('keystoreModalOkBtn');
            
            // Set title and button text for create mode
            titleEl.textContent = 'Create Keystore Entry';
            okBtn.textContent = 'Create';
            
            // Clear inputs
            keyNameInput.value = '';
            keyValueInput.value = '';
            keyValueInput.type = 'password';
            keyNameInput.disabled = false;
            
            // Reset eye icon
            this.resetEyeIcon();
            
            // Set callbacks
            this.onConfirm = () => {
                const keyName = keyNameInput.value.trim();
                const keyValue = keyValueInput.value;
                
                if (!keyName) {
                    showToast('Key name is required', 'error');
                    return;
                }
                
                if (!keyValue) {
                    showToast('Key value is required', 'error');
                    return;
                }
                
                this.hide();
                resolve({ keyName, keyValue });
            };
            
            this.onCancel = () => {
                this.hide();
                resolve(null);
            };
            
            // Show modal
            modal.classList.remove('hidden');
            
            // Focus key name input
            setTimeout(() => keyNameInput.focus(), 100);
        });
    },
    
    /**
     * Show the modal for editing an existing keystore entry
     * @param {string} keyName - The name of the key being edited
     * @returns {Promise} - Resolves with keyValue if confirmed, null if cancelled
     */
    showEdit: function(keyName) {
        return new Promise((resolve, reject) => {
            const modal = document.getElementById('keystoreModal');
            const titleEl = document.getElementById('keystoreModalTitle');
            const keyNameInput = document.getElementById('keystoreKeyName');
            const keyValueInput = document.getElementById('keystoreKeyValue');
            const okBtn = document.getElementById('keystoreModalOkBtn');
            
            // Set title and button text for edit mode
            titleEl.textContent = 'Edit Keystore Entry';
            okBtn.textContent = 'Update';
            
            // Set key name (read-only) and clear value
            keyNameInput.value = keyName;
            keyNameInput.disabled = true;
            keyValueInput.value = '';
            keyValueInput.type = 'password';
            
            // Reset eye icon
            this.resetEyeIcon();
            
            // Set callbacks
            this.onConfirm = () => {
                const keyValue = keyValueInput.value;
                
                if (!keyValue) {
                    showToast('Key value is required', 'error');
                    return;
                }
                
                this.hide();
                resolve(keyValue);
            };
            
            this.onCancel = () => {
                this.hide();
                resolve(null);
            };
            
            // Show modal
            modal.classList.remove('hidden');
            
            // Focus key value input
            setTimeout(() => keyValueInput.focus(), 100);
        });
    },
    
    /**
     * Toggle password visibility
     */
    togglePasswordVisibility: function() {
        const input = document.getElementById('keystoreKeyValue');
        const icon = document.getElementById('keystoreEyeIcon');
        
        if (input.type === 'password') {
            input.type = 'text';
            // Change icon to eye-slash (hidden)
            icon.innerHTML = `
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
            `;
        } else {
            input.type = 'password';
            // Change icon back to eye (visible)
            icon.innerHTML = `
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            `;
        }
    },
    
    /**
     * Reset eye icon to default state
     */
    resetEyeIcon: function() {
        const icon = document.getElementById('keystoreEyeIcon');
        icon.innerHTML = `
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
        `;
    },
    
    /**
     * Hide the modal
     */
    hide: function() {
        const modal = document.getElementById('keystoreModal');
        modal.classList.add('hidden');
        this.onConfirm = null;
        this.onCancel = null;
        this.currentEntryId = null;
    },
    
    /**
     * Handle confirm button click
     */
    confirm: function() {
        if (this.onConfirm) {
            this.onConfirm();
        }
    },
    
    /**
     * Handle cancel button click
     */
    cancel: function() {
        if (this.onCancel) {
            this.onCancel();
        }
    }
};

// Handle ESC key to close modal
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        const modal = document.getElementById('keystoreModal');
        if (modal && !modal.classList.contains('hidden')) {
            KeystoreModal.cancel();
        }
    }
});

// Handle Enter key to confirm
document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        const modal = document.getElementById('keystoreModal');
        if (modal && !modal.classList.contains('hidden')) {
            KeystoreModal.confirm();
        }
    }
});
</script>
