<!-- Stats Strip Component -->
<div id="statsStrip" class="flex items-center gap-3">
    <!-- Total Plugins Metric -->
    <div class="relative group cursor-help">
        <div class="flex items-center gap-3 px-4 py-2 bg-gray-700/50 rounded-lg border border-gray-600/50 hover:bg-gray-700 transition-colors">
            <div class="flex items-center justify-center w-8 h-8 bg-blue-600/20 rounded-lg">
                <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
            </div>
            <div>
                <div class="text-xs text-gray-400 font-medium">Total Plugins</div>
                <div id="totalPluginsCount" class="text-xl font-bold text-white">0</div>
            </div>
        </div>
    </div>
    
    <!-- Total Conditions Metric -->
    <div class="relative group cursor-help">
        <div class="flex items-center gap-3 px-4 py-2 bg-gray-700/50 rounded-lg border border-gray-600/50 hover:bg-gray-700 transition-colors">
            <div class="flex items-center justify-center w-8 h-8 bg-amber-600/20 rounded-lg">
                <span class="text-amber-400 font-bold italic text-sm">if</span>
            </div>
            <div>
                <div class="text-xs text-gray-400 font-medium">Total Conditions</div>
                <div id="totalConditionsCount" class="text-xl font-bold text-white">0</div>
            </div>
        </div>
    </div>
    
    <!-- Plaintext Passwords Indicator -->
    <div id="plaintextPasswordsIndicator" class="hidden relative group cursor-help">
        <div class="flex items-center gap-3 px-4 py-2 bg-gray-700/50 rounded-lg border border-gray-600/50 hover:bg-gray-700 transition-colors">
            <div class="flex items-center justify-center w-8 h-8 bg-amber-600/20 rounded-lg">
                <svg class="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <div>
                <div class="text-xs text-gray-400 font-medium flex items-center gap-1">
                    Plaintext passwords
                    <svg class="w-3 h-3 text-gray-400 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <div id="plaintextPasswordsCount" class="text-xl font-bold text-white">0</div>
            </div>
        </div>
        <div class="hidden group-hover:block absolute top-full left-1/2 transform -translate-x-1/2 mt-2 w-80 bg-gray-800 text-white text-xs rounded-lg shadow-lg p-3 z-50 border border-amber-500">
            <div class="font-semibold text-amber-400 mb-1">Plaintext Sensitive Fields</div>
            <div class="text-gray-300 mb-2">These are fields that are labeled as sensitive, but are not using a keystore value.</div>
            <div id="plaintextPasswordsTooltipContent" class="space-y-1 border-t border-gray-700 pt-2"></div>
            <div class="absolute bottom-full left-1/2 transform -translate-x-1/2 mb-1">
                <div class="w-2 h-2 bg-gray-800 border-l border-t border-amber-500 transform rotate-45"></div>
            </div>
        </div>
    </div>

    <!-- Blocking Problems Indicator -->
    <div id="blockingProblemsIndicator" class="hidden relative group cursor-help">
        <div id="blockingProblemsCapsule" class="flex items-center gap-3 px-4 py-2 bg-gray-700/50 rounded-lg border border-gray-600/50 hover:bg-gray-700 transition-colors">
            <div id="blockingProblemsIconContainer" class="flex items-center justify-center w-8 h-8 bg-gray-600/20 rounded-lg">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <div>
                <div class="text-xs text-gray-400 font-medium flex items-center gap-1">
                    Problems
                    <svg class="w-3 h-3 text-gray-400 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <div id="blockingProblemsCount" class="text-xl font-bold text-white">0</div>
            </div>
        </div>
        <div id="blockingProblemsTooltip" class="hidden group-hover:block absolute top-full left-1/2 transform -translate-x-1/2 mt-2 w-80 bg-gray-800 text-white text-xs rounded-lg shadow-lg p-3 z-50 border border-red-500">
            <div class="font-semibold text-red-400 mb-2">Blocking Problems Detected</div>
            <div id="blockingProblemsContent" class="text-gray-300 space-y-1"></div>
            <div class="absolute bottom-full left-1/2 transform -translate-x-1/2 mb-1">
                <div class="w-2 h-2 bg-gray-800 border-l border-t border-red-500 transform rotate-45"></div>
            </div>
        </div>
    </div>
    
    <!-- Validate Config Button -->
    <div class="relative group cursor-pointer">
        <button id="validateConfigBtn" onclick="validatePipelineConfig()" class="flex items-center gap-3 px-4 py-2 bg-gray-700/50 rounded-lg border border-gray-600/50 hover:bg-gray-700 transition-colors">
            <div class="flex items-center justify-center w-8 h-8 bg-purple-600/20 rounded-lg">
                <svg id="validateIcon" class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <div>
                <div class="text-xs text-gray-400 font-medium">Validate</div>
                <div id="validateStatus" class="text-xl font-bold text-white">Check config</div>
            </div>
        </button>
        <div id="validationTooltip" class="hidden group-hover:block absolute top-full left-1/2 transform -translate-x-1/2 mt-2 w-96 bg-gray-800 text-white text-xs rounded-lg shadow-lg p-3 z-50 border border-purple-500" onclick="event.stopPropagation()">
            <div class="flex justify-between items-start mb-2">
                <div class="font-semibold text-purple-400">Validation Results</div>
                <button onclick="document.getElementById('validationTooltip').classList.add('hidden')" class="text-gray-400 hover:text-white ml-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div id="validationContent" class="text-gray-300 space-y-1">Click to validate your pipeline configuration</div>
            <div class="absolute bottom-full left-1/2 transform -translate-x-1/2 mb-1">
                <div class="w-2 h-2 bg-gray-800 border-l border-t border-purple-500 transform rotate-45"></div>
            </div>
        </div>
    </div>
    
    <!-- Placeholder for future metrics -->
    <!-- Add more metric capsules here as needed -->
</div>
