input {
	stdin {
		codec => line
	}
}
filter {
	mutate {
		add_field => {
			"event.dataset" => "nginx.access"
			"service.name" => "nginx"
		}
	}
	grok {
		match => {
			"message" => [
				'%{IPORHOST:source.address} %{DATA:nginx.ident} %{DATA:user.name} \[%{HTTPDATE:nginx.access.time}\] "%{WORD:http.request.method} %{DATA:url.original} HTTP/%{NUMBER:http.version}" %{NUMBER:http.response.status_code:int} (?:%{NUMBER:http.response.body.bytes:int}|-) "%{DATA:http.request.referrer}" "%{DATA:user_agent.original}" %{NUMBER:nginx.access.request_time:float}',
				'%{IPORHOST:source.address} %{DATA:nginx.ident} %{DATA:user.name} \[%{HTTPDATE:nginx.access.time}\] "%{WORD:http.request.method} %{DATA:url.original} HTTP/%{NUMBER:http.version}" %{NUMBER:http.response.status_code:int} (?:%{NUMBER:http.response.body.bytes:int}|-) "%{DATA:http.request.referrer}" "%{DATA:user_agent.original}"',
				'%{IPORHOST:source.address} %{DATA:nginx.ident} %{DATA:user.name} \[%{HTTPDATE:nginx.access.time}\] "%{WORD:http.request.method} %{DATA:url.original} HTTP/%{NUMBER:http.version}" %{NUMBER:http.response.status_code:int} (?:%{NUMBER:http.response.body.bytes:int}|-) "%{DATA:http.request.referrer}" "%{DATA:user_agent.original}" (?:rt=%{NUMBER:nginx.access.request_time:float}\s+uct=%{NUMBER:nginx.access.upstream_connect_time:float}\s+uht=%{NUMBER:nginx.access.upstream_header_time:float}\s+urt=%{NUMBER:nginx.access.upstream_response_time:float})'
			]
		}
		tag_on_failure => ["_grok_nginx_access_fail"]
	}
	date {
		match => ["nginx.access.time", "dd/MMM/yyyy:HH:mm:ss Z"]
		target => "@timestamp"
	}
	urldecode {
		field => "url.original"
	}
	dissect {
		mapping => {
			"url.original" => "%{url.path}?%{url.query}"
		}
	}
	useragent {
		source => "user_agent.original"
		target => "user_agent"
	}
	mutate {
		copy => {
			"source.address" => "source.ip"
		}
	}
	geoip {
		source => "source.ip"
		target => "source.geo"
		tag_on_failure => ["_geoip_fail"]
	}
	mutate {
		gsub => ["http.request.referrer", "^-$", "", "user.name", "^-$", ""]
	}
	if [http][response][status_code] >= 500 {
		mutate {
			add_tag => ["nginx_server_error"]
		}
	}
	else if [http][response][status_code] >= 400 {
		mutate {
			add_tag => ["nginx_client_error"]
		}
	}
}
output {
	stdout {
		codec => rubydebug
	}
}
