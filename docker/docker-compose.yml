services:
  logstashui:
    image: codyjackson032/logstashui:latest
    # Uncomment below to build locally instead of pulling from Docker Hub
    #build:
    #  context: ./logstashui
    #  dockerfile: Dockerfile
    expose:
      - "8080"
    volumes:
      - logstashui_data:/app/data
      - ./logstashui.yml:/app/logstashui.yml:ro
      - ./logstashui.example.yml:/app/logstashui.example.yml:ro
    environment:
      - DEBUG=False
      # SECRET_KEY: Optional - will auto-generate and persist in data/.django_secret_key if not set
      # - SECRET_KEY=${SECRET_KEY}
      # ALLOWED_HOSTS: Set to your domain(s) in production (comma-separated)
      # Example: ALLOWED_HOSTS=yourdomain.com,www.yourdomain.com,192.168.1.100
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-}
      # LOGSTASHUI_CONFIG: Path to configuration file for simulation mode detection
      # Prefers logstashui.yml, falls back to logstashui.example.yml in config.py
      - LOGSTASHUI_CONFIG=/app/logstashui.yml
      # LOGSTASH_AGENT_URL: Automatically set in settings.py based on simulation mode
      # Host mode: http://host.docker.internal:9500 (native agent on host)
      # Embedded mode + DEBUG=True: http://logstashagent:9500 (direct)
      # Embedded mode + DEBUG=False: https://nginx:9500 (via nginx proxy)
    # Enable host.docker.internal on Linux (automatic on Docker Desktop)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - logstashui_network

  logstashagent:
    image: codyjackson032/logstashagent:latest
    # Uncomment below to build locally instead of pulling from Docker Hub
    #build:
    #  context: ./logstashagent
    #  dockerfile: Dockerfile
    profiles:
      - embedded  # Only start this container in embedded mode
    ports:
      - "9600:9600"  # Logstash API
      - "9449:9449"  # Logstash HTTP input (for sample events)
    expose:
      - "9500"  # FastAPI sidecar API (internal only, accessed via nginx)
    volumes:
      # Mount config files for dynamic runtime config (read-only)
      - ./logstashui.yml:/app/logstashui.yml:ro
      - ./logstashui.example.yml:/app/logstashui.example.yml:ro
    environment:
      # Override default LOGSTASH_URL (default: http://host.docker.internal:8080 for local dev)
      # In docker-compose, use nginx for HTTPS routing
      - LOGSTASH_URL=https://nginx
      - SIMULATION_MODE=true  # Enable file upload for simulation
    # Enable host.docker.internal on Linux (automatic on Docker Desktop)
    # Allows container to reach host machine when running Django locally
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # No restart policy - only runs in embedded mode via profile
    networks:
      - logstashui_network

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
      - "80:80"
      - "9500:9500"  # logstashagent API proxy (HTTPS)
    volumes:
      - ./logstashui/nginx.conf:/etc/nginx/nginx.conf.template:ro
      - ./logstashui.yml:/etc/logstashui.yml:ro
      - ./logstashui.example.yml:/etc/logstashui.example.yml:ro
      - nginx_certs:/etc/nginx/certs
    depends_on:
      - logstashui
    restart: unless-stopped
    networks:
      - logstashui_network
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ ! -f /etc/nginx/certs/cert.pem ]; then
          apk add --no-cache openssl &&
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout /etc/nginx/certs/key.pem \
            -out /etc/nginx/certs/cert.pem \
            -subj '/CN=localhost'
        fi
        apk add --no-cache py3-pip
        pip3 install pyyaml --break-system-packages
        # Check for logstashui.yml first, fallback to logstashui.example.yml
        if [ -f /etc/logstashui.yml ]; then
          CONFIG_FILE="/etc/logstashui.yml"
        else
          CONFIG_FILE="/etc/logstashui.example.yml"
        fi
        MODE=$$(python3 -c "import yaml; print(yaml.safe_load(open('$$CONFIG_FILE')).get('simulation', {}).get('mode', 'embedded'))")
        if [ "$$MODE" = "host" ]; then
          UPSTREAM="host.docker.internal:9501"
        else
          UPSTREAM="logstashagent:9500"
        fi
        sed "s/AGENT_UPSTREAM_PLACEHOLDER/$$UPSTREAM/g" /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf
        echo "Nginx configured for $$MODE mode, agent upstream $$UPSTREAM"
        nginx -g 'daemon off;'

volumes:
  logstashui_data:
  nginx_certs:

networks:
  logstashui_network:
